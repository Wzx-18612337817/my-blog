    let rocketTexture = null;
    function generateRocketTexture() {
      const canvas = document.createElement('canvas');
      const size = 512;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const cx = size / 2;
      const cy = size / 2;
      const bodyLength = size * 0.45;
      const bodyWidth = size * 0.15;

      ctx.save();
      ctx.translate(cx, cy);

      ctx.fillStyle = '#4a5568';
      ctx.beginPath();
      ctx.moveTo(0, -bodyLength);
      ctx.bezierCurveTo(bodyWidth * 1.8, -bodyLength * 0.7, bodyWidth * 2, -bodyLength * 0.2, bodyWidth * 1.4, bodyLength * 0.5);
      ctx.lineTo(bodyWidth * 1, bodyLength * 0.7);
      ctx.lineTo(-bodyWidth * 1, bodyLength * 0.7);
      ctx.lineTo(-bodyWidth * 1.4, bodyLength * 0.5);
      ctx.bezierCurveTo(-bodyWidth * 2, -bodyLength * 0.2, -bodyWidth * 1.8, -bodyLength * 0.7, 0, -bodyLength);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#2d3748';
      ctx.beginPath();
      ctx.moveTo(bodyWidth * 1, bodyLength * 0.4);
      ctx.lineTo(bodyWidth * 0.7, bodyLength * 0.6);
      ctx.lineTo(-bodyWidth * 0.7, bodyLength * 0.6);
      ctx.lineTo(-bodyWidth * 1, bodyLength * 0.4);
      ctx.closePath();
      ctx.fill();

      const cockpitGrad = ctx.createLinearGradient(-bodyWidth * 0.4, -bodyLength * 0.7, bodyWidth * 0.4, -bodyLength * 0.4);
      cockpitGrad.addColorStop(0, 'rgba(100, 150, 255, 0.9)');
      cockpitGrad.addColorStop(0.5, 'rgba(150, 200, 255, 1)');
      cockpitGrad.addColorStop(1, 'rgba(100, 150, 255, 0.9)');
      ctx.fillStyle = cockpitGrad;
      ctx.beginPath();
      ctx.moveTo(0, -bodyLength * 0.85);
      ctx.bezierCurveTo(bodyWidth * 0.5, -bodyLength * 0.75, bodyWidth * 0.45, -bodyLength * 0.45, 0, -bodyLength * 0.5);
      ctx.bezierCurveTo(-bodyWidth * 0.45, -bodyLength * 0.45, -bodyWidth * 0.5, -bodyLength * 0.75, 0, -bodyLength * 0.85);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = 'rgba(100, 200, 255, 0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, -bodyLength * 0.55, bodyWidth * 0.3, 0, PI * 2);
      ctx.stroke();

      ctx.fillStyle = '#4a5568';
      ctx.beginPath();
      ctx.moveTo(-bodyWidth * 0.9, bodyLength * 0.1);
      ctx.lineTo(-bodyWidth * 3.5, bodyLength * 0.4);
      ctx.lineTo(-bodyWidth * 2.8, bodyLength * 0.6);
      ctx.lineTo(-bodyWidth * 0.7, bodyLength * 0.3);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(bodyWidth * 0.9, bodyLength * 0.1);
      ctx.lineTo(bodyWidth * 3.5, bodyLength * 0.4);
      ctx.lineTo(bodyWidth * 2.8, bodyLength * 0.6);
      ctx.lineTo(bodyWidth * 0.7, bodyLength * 0.3);
      ctx.closePath();
      ctx.fill();

      const solarGrad = ctx.createLinearGradient(-bodyWidth * 3.2, bodyLength * 0.2, -bodyWidth * 3.2, bodyLength * 0.5);
      solarGrad.addColorStop(0, 'rgba(0, 150, 255, 0.7)');
      solarGrad.addColorStop(0.5, 'rgba(50, 200, 255, 0.5)');
      solarGrad.addColorStop(1, 'rgba(0, 150, 255, 0.7)');
      ctx.fillStyle = solarGrad;
      ctx.beginPath();
      ctx.moveTo(-bodyWidth * 1.4, bodyLength * 0.15);
      ctx.lineTo(-bodyWidth * 3.2, bodyLength * 0.2);
      ctx.lineTo(-bodyWidth * 3.2, bodyLength * 0.5);
      ctx.lineTo(-bodyWidth * 1.4, bodyLength * 0.45);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(bodyWidth * 1.4, bodyLength * 0.15);
      ctx.lineTo(bodyWidth * 3.2, bodyLength * 0.2);
      ctx.lineTo(bodyWidth * 3.2, bodyLength * 0.5);
      ctx.lineTo(bodyWidth * 1.4, bodyLength * 0.45);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = '#00bfff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-bodyWidth * 1.2, -bodyLength * 0.1);
      ctx.lineTo(bodyWidth * 1.2, -bodyLength * 0.1);
      ctx.moveTo(-bodyWidth * 1.2, bodyLength * 0.1);
      ctx.lineTo(bodyWidth * 1.2, bodyLength * 0.1);
      ctx.stroke();

      ctx.restore();

      const img = new Image();
      img.src = canvas.toDataURL('image/png');
      return img;
    }

    // ================= HUD 与消息 =================

    function updateHUD() {
      let nearestPlanet = null, minDist = Infinity;
      for (const p of planets) {
        if (p.name === '太阳') continue;
        const d = rocket.pos.dist(p.pos);
        if (d < minDist) {
          minDist = d;
          nearestPlanet = p;
        }
      }
      if (!nearestPlanet) nearestPlanet = earth;

      const altitude = Math.max(0, rocket.pos.dist(nearestPlanet.pos) - nearestPlanet.radius - ROCKET_HALF_HEIGHT);
      elAltitude.textContent = Math.round(altitude).toLocaleString() + ' km';

      const SPEED_SCALE = 50;
      const speed = rocket.relVel.mag() * SPEED_SCALE;
      elSpeed.textContent = Math.round(speed).toLocaleString() + ' km/s';
      elFuelBar.style.transform = `scaleX(${rocket.fuel / MAX_FUEL})`;

      if (!rocket.crossedKarmenLine && altitude >= 100) {
        rocket.crossedKarmenLine = true;
        showMessage('越过卡门线，进入太空！');
      }

      elNearest.textContent = nearestPlanet ? nearestPlanet.name + ` (${Math.round(minDist - nearestPlanet.radius).toLocaleString()} km)` : '未知';

      const visitedCount = planets.filter(p => p.visited).length;
      elVisited.textContent = visitedCount;

      const statCurrent = document.getElementById('stat-current');
      const statActive = document.getElementById('stat-active');
      const statCompleted = document.getElementById('stat-completed');
      const statTotal = document.getElementById('stat-total');
      const rocketStatus = document.getElementById('rocket-status');
      const fuelStatus = document.getElementById('fuel-status');
      const altitudeStatus = document.getElementById('altitude-status');
      const speedStatus = document.getElementById('speed-status');

      if (statTotal) statTotal.textContent = planets.length;
      if (statCompleted) statCompleted.textContent = visitedCount;
      if (statCurrent) statCurrent.textContent = visitedCount < planets.length ? 1 : 0;

      let statusText = '等待发射';
      if (rocket.crashed) statusText = '已坠毁';
      else if (rocket.landed) statusText = '已着陆';
      else if (rocket.thrusting) statusText = '推进中';
      else if (!rocket.onLaunchPad && !rocket.crashed) statusText = '飞行中';
      if (rocketStatus) rocketStatus.textContent = '火箭状态：' + statusText;

      if (statActive) statActive.textContent = (!rocket.onLaunchPad && !rocket.crashed) ? 1 : 0;

      const fuelPercent = Math.round((rocket.fuel / MAX_FUEL) * 100);
      let fuelText = '满仓';
      if (fuelPercent === 0) fuelText = '耗尽';
      else if (fuelPercent < 20) fuelText = '低 (' + fuelPercent + '%)';
      else if (fuelPercent < 50) fuelText = '中等 (' + fuelPercent + '%)';
      else if (fuelPercent < 80) fuelText = '较高 (' + fuelPercent + '%)';
      if (fuelStatus) fuelStatus.textContent = '燃料状态：' + fuelText;

      if (altitudeStatus) altitudeStatus.textContent = '高度：' + Math.round(altitude).toLocaleString() + ' km';
      if (speedStatus) speedStatus.textContent = '速度：' + Math.round(speed).toLocaleString() + ' km/s';
    }

    // ================= 绘制轨迹线 =================
    let trajectory = [];
    function updateTrajectory() {
      const speed = rocket.vel.mag();
      if (speed > 0.5) {
        trajectory.push({ x: rocket.pos.x, y: rocket.pos.y });
        if (trajectory.length > 600) trajectory.shift();
      }
    }
    function drawTrajectory(ctx, camera) {
      if (trajectory.length < 2) return;
      ctx.strokeStyle = 'rgba(100, 200, 255, 0.25)';
      ctx.lineWidth = Math.max(1, ROCKET_WIDTH * ROCKET_VISUAL_SCALE * camera.zoom);
      ctx.beginPath();
      const start = camera.worldToScreen(new Vec2(trajectory[0].x, trajectory[0].y));
      ctx.moveTo(start.x, start.y);
      for (let i = 1; i < trajectory.length; i += 2) {
        const p = camera.worldToScreen(new Vec2(trajectory[i].x, trajectory[i].y));
        ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }

    // ================= 轨道线 =================
    function drawOrbits(ctx, camera) {
      const moonCenter = { '月球': earth };
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
      ctx.lineWidth = 1;
      for (const p of planets) {
        if (p.name === '太阳') continue;
        const center = moonCenter[p.name] || sun;
        const centerScreen = camera.worldToScreen(center.pos);
        const radius = p.pos.dist(center.pos) * camera.zoom;
        if (radius < 2) continue;
        ctx.beginPath();
        ctx.arc(centerScreen.x, centerScreen.y, radius, 0, PI * 2);
        ctx.stroke();
      }
    }

    // ================= 绘制星球名称（带重叠检测）=================
    let planetNamePositions = [];
    function drawPlanetNames(ctx, camera) {
      planetNamePositions = [];
      const namePositions = planetNamePositions;
      const textHeight = 18;

      let earthIdx = -1;
      let moonIdx = -1;

      ctx.save();
      ctx.font = '14px Microsoft YaHei';

      for (let i = 0; i < planets.length; i++) {
        const p = planets[i];
        const screenPos = camera.worldToScreen(p.pos);
        const r = p.radius * camera.zoom;
        const width = ctx.measureText(p.name).width;
        namePositions.push({
          x: screenPos.x,
          y: screenPos.y + Math.max(r, 2) + 8,
          name: p.name,
          width: width,
          height: textHeight
        });
        if (p.name === '地球') earthIdx = i;
        if (p.name === '月球') moonIdx = i;
      }

      ctx.restore();

      const overlapping = new Set();
      for (let i = 0; i < namePositions.length; i++) {
        for (let j = i + 1; j < namePositions.length; j++) {
          const a = namePositions[i];
          const b = namePositions[j];
          const halfWidthA = a.width / 2;
          const halfWidthB = b.width / 2;
          if (Math.abs(a.x - b.x) < halfWidthA + halfWidthB && Math.abs(a.y - b.y) < textHeight) {
            overlapping.add(i);
            overlapping.add(j);
          }
        }
      }

      const earthMoonOverlap = earthIdx >= 0 && moonIdx >= 0 && overlapping.has(earthIdx) && overlapping.has(moonIdx);

      let earthMoonNameBlocked = false;
      if (earthMoonOverlap) {
        const earthPos = namePositions[earthIdx];
        const moonPos = namePositions[moonIdx];
        const midX = (earthPos.x + moonPos.x) / 2;
        const midY = (earthPos.y + moonPos.y) / 2;
        ctx.font = '18px Microsoft YaHei';
        const earthMoonWidth = ctx.measureText('地月系').width;
        ctx.font = '14px Microsoft YaHei';
        const halfEarthMoonWidth = earthMoonWidth / 2;
        for (let i = 0; i < namePositions.length; i++) {
          if (i === earthIdx || i === moonIdx) continue;
          const other = namePositions[i];
          const halfOtherWidth = other.width / 2;
          if (Math.abs(midX - other.x) < halfEarthMoonWidth + halfOtherWidth && Math.abs(midY - other.y) < textHeight) {
            earthMoonNameBlocked = true;
            if (!overlapping.has(i)) {
              overlapping.add(i);
            }
            break;
          }
        }
      }

      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = '14px Microsoft YaHei';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.shadowColor = 'rgba(0,0,0,0.85)';
      ctx.shadowBlur = 3;

      let visibleCount = 0;
      for (let i = 0; i < namePositions.length; i++) {
        if (!overlapping.has(i)) {
          visibleCount++;
          const np = namePositions[i];
          ctx.fillText(np.name, np.x, np.y);
        }
      }

      if (earthMoonOverlap && !earthMoonNameBlocked) {
        visibleCount++;
        const earthPos = namePositions[earthIdx];
        const moonPos = namePositions[moonIdx];
        const midX = (earthPos.x + moonPos.x) / 2;
        const midY = (earthPos.y + moonPos.y) / 2;
        ctx.font = '18px Microsoft YaHei';
        ctx.fillText('地月系', midX, midY);
        ctx.font = '14px Microsoft YaHei';
      }

      if (visibleCount === 0) {
        let totalX = 0, totalY = 0;
        for (const np of namePositions) {
          totalX += np.x;
          totalY += np.y;
        }
        const centerX = totalX / namePositions.length;
        const centerY = totalY / namePositions.length;
        ctx.font = '18px Microsoft YaHei';
        ctx.fillText('太阳系', centerX, centerY);
      }

      ctx.restore();
    }

    // ================= 发射基地 =================
    function drawLaunchBase(ctx, camera) {
      const planet = earth;
      const normal = new Vec2(Math.cos(LAUNCH_PAD_ANGLE), Math.sin(LAUNCH_PAD_ANGLE));
      const surface = planet.pos.add(normal.mul(planet.radius));
      const sp = camera.worldToScreen(surface);
      const z = camera.zoom * 0.001;

      ctx.save();
      ctx.translate(sp.x, sp.y);
      ctx.rotate(LAUNCH_PAD_ANGLE + PI / 2);

      function drawBeam(x, y, w, h, lightDir = 1) {
        const grad = ctx.createLinearGradient(
          x + (lightDir > 0 ? 0 : w), y,
          x + (lightDir > 0 ? w : 0), y
        );
        grad.addColorStop(0, '#2d3748');
        grad.addColorStop(0.25, '#718096');
        grad.addColorStop(0.5, '#a0aec0');
        grad.addColorStop(0.75, '#718096');
        grad.addColorStop(1, '#2d3748');
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, w, h);
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 0.5 * z;
        ctx.strokeRect(x, y, w, h);
      }

      function drawBuilding(x, y, w, h, color, icon, type) {
        const grad = ctx.createLinearGradient(x, y - h, x, y);
        grad.addColorStop(0, color);
        grad.addColorStop(1, '#1a202c');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(x, y - h, w, h, 3 * z);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1 * z;
        ctx.stroke();

        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.font = `${18 * z}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(icon, x + w / 2, y - h * 0.55);

        ctx.font = `${8 * z}px Arial`;
        ctx.fillStyle = 'rgba(255,255,255,0.7)';

        const angle = LAUNCH_PAD_ANGLE + PI / 2;
        const worldX = sp.x + x * Math.cos(angle) - y * Math.sin(angle);
        const worldY = sp.y + x * Math.sin(angle) + y * Math.cos(angle);
        buildingRects.push({
          type: type,
          x: worldX,
          y: worldY - h,
          w: w,
          h: h
        });
      }

      // 发射台主体
      const platW = 90 * z, platH = 14 * z;
      const conGrad = ctx.createLinearGradient(0, -platH, 0, 0);
      conGrad.addColorStop(0, '#4a5568');
      conGrad.addColorStop(0.5, '#718096');
      conGrad.addColorStop(1, '#2d3748');
      ctx.fillStyle = conGrad;
      ctx.beginPath();
      ctx.roundRect(-platW / 2, -platH, platW, platH, 3 * z);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 1 * z;
      ctx.stroke();

      // 左侧固定发射塔
      const towerX = -36 * z;
      const towerW = 14 * z;
      const towerH = 160 * z;
      const legW = 2.5 * z;
      for (let i = 0; i < 4; i++) {
        const lx = towerX + (i * (towerW - legW) / 3);
        drawBeam(lx, -towerH, legW, towerH, i % 2 === 0 ? 1 : -1);
      }
      const levels = [-towerH * 0.15, -towerH * 0.35, -towerH * 0.55, -towerH * 0.78];
      for (const ly of levels) {
        drawBeam(towerX - 2 * z, ly, towerW + 4 * z, 4 * z, 1);
      }

      // 右侧服务塔
      const svcX = 28 * z;
      const svcW = 10 * z;
      const svcH = 130 * z;
      drawBeam(svcX, -svcH, svcW, svcH, 1);
      const svcLevels = [-svcH * 0.22, -svcH * 0.48, -svcH * 0.72];
      for (const ly of svcLevels) {
        drawBeam(svcX - 1.5 * z, ly, svcW + 3 * z, 3 * z, 1);
      }

      // 地面导流槽
      const flameW = 24 * z, flameH = 6 * z;
      const flameGrad = ctx.createLinearGradient(0, -flameH, 0, 0);
      flameGrad.addColorStop(0, '#1a202c');
      flameGrad.addColorStop(1, '#4a5568');
      ctx.fillStyle = flameGrad;
      ctx.beginPath();
      ctx.roundRect(-flameW / 2, -flameH, flameW, flameH, 2 * z);
      ctx.fill();

      // 控制中心 - 左侧
      drawBuilding(-110 * z, -5 * z, 45 * z, 70 * z, '#4a5568', '🎮', 'control');
      ctx.fillText('控制中心', -110 * z + 22.5 * z, -5 * z - 5 * z);

      // 研发中心 - 左前方（地面上）
      drawBuilding(-60 * z, -5 * z, 38 * z, 55 * z, '#4c51bf', '🔬', 'research');
      ctx.fillText('研发中心', -60 * z + 19 * z, -5 * z - 5 * z);

      // 制造中心 - 右侧
      drawBuilding(85 * z, -5 * z, 50 * z, 65 * z, '#dd6b20', '🏗️', 'manufacture');
      ctx.fillText('制造中心', 85 * z + 25 * z, -5 * z - 5 * z);

      // 地面道路连接
      ctx.fillStyle = '#374151';
      ctx.fillRect(-140 * z, -5 * z, 280 * z, 10 * z);
      ctx.fillStyle = '#4a5568';
      ctx.fillRect(-135 * z, -3 * z, 270 * z, 6 * z);

      ctx.restore();
    }

    // ================= 小地图 =================
    function drawMinimap(ctx) {
      const size = 140;
      const margin = 16;
      const x = window.innerWidth - size - margin;
      const y = window.innerHeight - size - margin;
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, y, size, size, 8);
      ctx.fill();
      ctx.stroke();

      const range = 5000000000; // 小地图覆盖整个太阳系，范围约 50 亿 km
      const scale = size / (range * 2);
      const cx = x + size / 2;
      const cy = y + size / 2;

      for (const p of planets) {
        const px = cx + (p.pos.x - camera.pos.x) * scale;
        const py = cy + (p.pos.y - camera.pos.y) * scale;
        if (px < x || px > x + size || py < y || py > y + size) continue;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(px, py, Math.max(2, p.radius * scale), 0, PI * 2);
        ctx.fill();
      }

      // 火箭
      const rx = cx + (rocket.pos.x - camera.pos.x) * scale;
      const ry = cy + (rocket.pos.y - camera.pos.y) * scale;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(rx, ry, 3, 0, PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // ================= 姿态指示器 =================
    function drawAttitudeIndicator(ctx) {
      const size = 140;
      const margin = 16;
      const x = window.innerWidth - size - margin;
      const y = margin;
      const cx = x + size / 2;
      const cy = y + size / 2;

      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x, y, size, size, 8);
      ctx.fill();
      ctx.stroke();

      // 参考圆
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(cx, cy, size * 0.35, 0, PI * 2);
      ctx.stroke();

      // 火箭姿态
      ctx.translate(cx, cy);
      ctx.rotate(rocket.angle + PI / 2);

      // 箭体
      ctx.fillStyle = '#e0e0e0';
      ctx.beginPath();
      ctx.ellipse(0, 0, 6, 28, 0, 0, PI * 2);
      ctx.fill();

      // 头锥
      ctx.fillStyle = '#ff4d4d';
      ctx.beginPath();
      ctx.moveTo(-6, -28);
      ctx.quadraticCurveTo(0, -40, 6, -28);
      ctx.fill();

      // 尾翼
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.moveTo(-6, 18);
      ctx.lineTo(-14, 30);
      ctx.lineTo(-6, 26);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(6, 18);
      ctx.lineTo(14, 30);
      ctx.lineTo(6, 26);
      ctx.fill();

      // 窗口
      ctx.fillStyle = '#87ceeb';
      ctx.beginPath();
      ctx.arc(0, -10, 4, 0, PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // ================= 主循环 =================
    function loop() {
      buildingRects = [];

      // 处理重置
      if (keys['KeyR']) {
        rocket.reset();
        trajectory = [];
        particles = [];
        camera.pos = new Vec2(rocket.pos.x, rocket.pos.y);
        camera.targetManualZoom = 1;
      }

      // 重置手动缩放
      if (keys['Digit0']) {
        camera.targetManualZoom = 1;
      }

      for (const p of planets) {
        p.updateOrbit(timeSpeed);
      }

      asteroidBelt.update();

      rocket.update(planets);
      if (!camera.followTarget) {
        camera.followTarget = rocket;
      }
      camera.update();
      updateTrajectory();

      checkPlanetMissions();
      checkSignalDetection();

      // 绘制
      ctx.fillStyle = '#05070a';
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      stars.draw(ctx, camera);
      drawTrajectory(ctx, camera);
      drawOrbits(ctx, camera);

      asteroidBelt.draw(ctx, camera);

      // 按 y 坐标排序绘制星球（简单的深度排序）
      const sortedPlanets = [...planets].sort((a, b) => a.pos.y - b.pos.y);
      for (const p of sortedPlanets) p.draw(ctx, camera);

      drawPlanetNames(ctx, camera);

      drawLaunchBase(ctx, camera);

      rocket.draw(ctx, camera);

      drawMinimap(ctx);
      drawAttitudeIndicator(ctx);
      updateHUD();

      requestAnimationFrame(loop);
    }

      if (gameState.storyLog.length === 0) {
        addStoryLog('📅 公元2157年，赫尔墨斯号正式启程', true, 'info');
        addStoryLog('🎯 任务目标：遍历太阳系八大行星，建立科考前哨站', true, 'mission');
        addStoryLog('🛸 当前位置：地球轨道', true, 'info');
        addStoryLog('💡 提示：点击雅典娜按钮可查看任务详情和剧情对话', true, 'info');
        addStoryLog('🔔 发现碎片、完成任务时日志会自动更新', true, 'info');
      }
      
      canvas.classList.add('game-active');
      
      if (!rocketTexture) {
        rocketTexture = generateRocketTexture();
      }
      
      if (window.stopStars) {
        window.stopStars();
      }
      
      const rocketType = ROCKET_TYPES[rocketConfig.type];
      
      THRUST_FORCE = rocketType.thrust;
      MAX_FUEL = rocketType.maxFuel;
      FUEL_BURN = rocketType.fuelBurn;
      
      rocket.dryMass = rocketType.dryMass;
      rocket.fuelMass = rocketType.fuelMass;
      rocket.fuel = MAX_FUEL;
      
      let introPhase = 0;
      const zoomOutDuration = 8000;
      const waitDuration = 2000;
      const zoomInDuration = 8000;
      const startTime = Date.now();
      const initialZoom = camera.targetManualZoom;
      
      function smoothstep(t) {
          return t * t * (3 - 2 * t);
        }
        
        function introAnimation() {
          const elapsed = Date.now() - startTime;
          
          if (introPhase === 0) {
            const progress = Math.min(elapsed / zoomOutDuration, 1);
            const easedProgress = smoothstep(progress);
            camera.targetManualZoom = Math.pow(10, Math.log10(initialZoom) * (1 - easedProgress) + Math.log10(ZOOM_MIN) * easedProgress);
            if (elapsed > zoomOutDuration) {
              introPhase = 1;
            }
          } else if (introPhase === 1) {
            camera.targetManualZoom = ZOOM_MIN;
            if (elapsed > zoomOutDuration + waitDuration) {
              introPhase = 2;
            }
          } else if (introPhase === 2) {
            const progress = Math.min((elapsed - zoomOutDuration - waitDuration) / zoomInDuration, 1);
            const easedProgress = smoothstep(progress);
            camera.targetManualZoom = Math.pow(10, Math.log10(ZOOM_MIN) * (1 - easedProgress) + Math.log10(ZOOM_MAX / 2) * easedProgress);
            if (elapsed > zoomOutDuration + waitDuration + zoomInDuration) {
              introPhase = 3;
            }
          } else if (introPhase === 3) {
            const transitionDuration = 2000;
            const transitionStart = zoomOutDuration + waitDuration + zoomInDuration;
            const progress = Math.min((elapsed - transitionStart) / transitionDuration, 1);
            const easedProgress = smoothstep(progress);
            const startX = camera.pos.x;
            const startY = camera.pos.y;
            camera.pos.x = startX + (rocket.pos.x - startX) * easedProgress;
            camera.pos.y = startY + (rocket.pos.y - startY) * easedProgress;
            if (elapsed > transitionStart + transitionDuration) {
              camera.follow(rocket);
              document.getElementById('antigravity-btn').style.display = 'block';
              document.getElementById('warp-btn').style.display = 'block';
              document.getElementById('athena-btn').classList.remove('hidden');
              document.getElementById('athena-nav-label').classList.add('visible');
              showAthenaDialogue('intro');
              loop();
              return;
            }
          }
          
          for (const p of planets) {
            p.updateOrbit(timeSpeed);
          }
          rocket.update(planets);
          camera.follow(rocket.pos);
          
          ctx.fillStyle = '#05070a';
          ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
          stars.draw(ctx, camera);
          drawOrbits(ctx, camera);
          const sortedPlanets = [...planets].sort((a, b) => a.pos.y - b.pos.y);
          for (const p of sortedPlanets) p.draw(ctx, camera);
          rocket.draw(ctx, camera);
          drawPlanetNames(ctx, camera);
          
          requestAnimationFrame(introAnimation);
        }
      
      introAnimation();
    }

    document.getElementById('tips-btn').addEventListener('click', () => {
      openCenterScreen('tips');

    let buildingRects = [];

    function closeCenterScreen() {
      const screen = document.getElementById('center-screen');
      screen.classList.remove('active');
    }

    document.getElementById('center-close').addEventListener('click', closeCenterScreen);

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      for (const b of buildingRects) {
        if (mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h) {
          openCenterScreen(b.type);
          break;
        }
      }

      const worldX = (mouseX - window.innerWidth / 2) / camera.zoom + camera.pos.x;
      const worldY = (mouseY - window.innerHeight / 2) / camera.zoom + camera.pos.y;

      let hitPlanet = false;

      for (const p of planets) {
        if (p.name === '太阳') continue;
        const screenPos = camera.worldToScreen(p.pos);
        const screenRadius = p.radius * camera.zoom;
        const dx = mouseX - screenPos.x;
        const dy = mouseY - screenPos.y;
        if (dx * dx + dy * dy <= screenRadius * screenRadius) {
          if (rocket.planet === p) {
            camera.followTarget = null;
          } else {
            camera.followTarget = p;
          }
          hitPlanet = true;
          break;
        }
      }

      if (!hitPlanet) {
        if (planetNamePositions.length === 0) {
          for (const p of planets) {
            if (p.name === '太阳') continue;
            const screenPos = camera.worldToScreen(p.pos);
            const r = p.radius * camera.zoom;
            const nameY = screenPos.y + Math.max(r, 2) + 8;
            const nameHeight = 24;
            const nameWidth = 60;
            if (mouseX >= screenPos.x - nameWidth / 2 && mouseX <= screenPos.x + nameWidth / 2 &&
                mouseY >= nameY && mouseY <= nameY + nameHeight) {
              camera.followTarget = p;
              hitPlanet = true;
              break;
            }
          }
        } else {
          for (const np of planetNamePositions) {
            if (np.name === '太阳') continue;
            const padding = 4;
            if (mouseX >= np.x - np.width / 2 - padding && mouseX <= np.x + np.width / 2 + padding &&
                mouseY >= np.y - padding && mouseY <= np.y + np.height + padding) {
              const p = planets.find(pp => pp.name === np.name);
              if (p) {
                camera.followTarget = p;
                hitPlanet = true;
                break;
              }
            }
          }
        }
      }

      if (!hitPlanet) {
        const rocketScreenPos = camera.worldToScreen(rocket.pos);
        const rocketRadius = ROCKET_HALF_HEIGHT * camera.zoom;
        const dxR = mouseX - rocketScreenPos.x;
        const dyR = mouseY - rocketScreenPos.y;
        if (dxR * dxR + dyR * dyR <= rocketRadius * rocketRadius) {
          camera.followTarget = null;
        }
      }

      const attitudeSize = 140;
      const attitudeMargin = 16;
      const attitudeX = window.innerWidth - attitudeSize - attitudeMargin;
      const attitudeY = attitudeMargin;
      if (mouseX >= attitudeX && mouseX <= attitudeX + attitudeSize &&
          mouseY >= attitudeY && mouseY <= attitudeY + attitudeSize) {
        camera.followTarget = null;
      }
    });

    const bgMusic = document.getElementById('bg-music');
    if (bgMusic) bgMusic.volume = 0.1;
    const musicBtn = document.getElementById('music-btn');
    const musicPanel = document.getElementById('music-panel');
    const musicToggle = document.getElementById('music-toggle');
    const volumeSlider = document.getElementById('volume-slider');
    const volumeValue = document.getElementById('volume-value');

    if (musicBtn) {
      musicBtn.addEventListener('click', () => {
        musicPanel.style.display = musicPanel.style.display === 'block' ? 'none' : 'block';
      });

      document.addEventListener('click', (e) => {
        if (!musicBtn.contains(e.target) && !musicPanel.contains(e.target)) {
          musicPanel.style.display = 'none';
        }
      });
    }

    if (musicToggle) {
      musicToggle.addEventListener('click', () => {
        if (bgMusic && bgMusic.paused) {
          bgMusic.play().then(() => {
            musicToggle.textContent = '暂停';
          }).catch(() => {
            showMessage('请先将 music.mp3 文件放到项目目录');
          });
        } else if (bgMusic) {
          bgMusic.pause();
          musicToggle.textContent = '播放';
        }
      });
    }

    if (volumeSlider && bgMusic) {
      volumeSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        bgMusic.volume = val;
        if (volumeValue) volumeValue.textContent = Math.round(val * 100) + '%';
      });
    }

    const voiceToggle = document.getElementById('voice-toggle');
    if (voiceToggle) {
      voiceToggle.addEventListener('click', () => {
        gameState.voiceEnabled = !gameState.voiceEnabled;
        voiceToggle.textContent = gameState.voiceEnabled ? '🔊 语音开启' : '🔇 语音关闭';
        if (!gameState.voiceEnabled && window.speechSynthesis) {
          window.speechSynthesis.cancel();
        }
      });
    }

    const athenaVoiceSelect = document.getElementById('athena-voice-select');
    let retryCount = 0;
    
    function populateVoiceSelect() {
      if (!athenaVoiceSelect) return;
      
      athenaVoiceSelect.innerHTML = '<option value="">自动选择</option>';
      
      const zhVoices = cachedVoices.filter(v => v.lang.startsWith('zh'));
      
      if (zhVoices.length === 0 && retryCount < 5) {
        retryCount++;
        console.log(`[Voice] No voices found, retrying... (${retryCount}/5)`);
        setTimeout(() => {
          loadVoices();
          populateVoiceSelect();
        }, 500);
        return;
      }
      
      zhVoices.forEach(voice => {
        const option = document.createElement('option');
        option.value = voice.name;
        option.textContent = voice.name;
        athenaVoiceSelect.appendChild(option);
      });
      
      if (gameState.athenaVoice) {
        athenaVoiceSelect.value = gameState.athenaVoice;
      }
      
      console.log(`[Voice] Populated ${zhVoices.length} Chinese voices`);
    }
    
    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = () => {
        loadVoices();
        populateVoiceSelect();
      };
      populateVoiceSelect();
    }
    
    if (athenaVoiceSelect) {
      athenaVoiceSelect.addEventListener('change', (e) => {
        gameState.athenaVoice = e.target.value;
        console.log('Athena voice changed to:', gameState.athenaVoice || 'auto');
      });
    }
    
    const voicePreviewBtn = document.getElementById('voice-preview-btn');
    if (voicePreviewBtn) {
      voicePreviewBtn.addEventListener('click', () => {
        speakDialogue('指挥官，这是我的新音色。感觉如何？', 'athena');
      });
    }

    const startBtn = document.getElementById('start-btn');
    if (startBtn) {
      startBtn.addEventListener('click', () => {
        if (bgMusic) bgMusic.play().catch(() => {});
        if (musicToggle) musicToggle.textContent = '暂停';
        openRocketBuilder();
      });
    }
    
    const antiGravityBtn = document.getElementById('antigravity-btn');
    if (antiGravityBtn) {
      antiGravityBtn.addEventListener('click', () => {
        rocket.antiGravity = !rocket.antiGravity;
        if (rocket.antiGravity) {
          antiGravityBtn.classList.add('active');
          antiGravityBtn.textContent = '反重力模式 ON';
        } else {
          antiGravityBtn.classList.remove('active');
          antiGravityBtn.textContent = '反重力模式 OFF';
        }
      });
    }

    const warpBtn = document.getElementById('warp-btn');
    if (warpBtn) {
      let warpState = 0; 
      warpBtn.addEventListener('click', () => {
        rocket.warpMode = false;
        rocket.warpProMode = false;
        warpBtn.classList.remove('active');
        
        warpState = (warpState + 1) % 3;
        
        if (warpState === 1) {
          rocket.warpMode = true;
          warpBtn.classList.add('active');
          warpBtn.textContent = '曲率模式 ON';
          warpBtn.style.background = 'rgba(150, 0, 255, 0.4)';
          warpBtn.style.borderColor = 'rgba(200, 0, 255, 0.8)';
        } else if (warpState === 2) {
          rocket.warpProMode = true;
          warpBtn.classList.add('active');
          warpBtn.textContent = '曲率模式Pro ON';
          warpBtn.style.background = 'rgba(255, 200, 0, 0.4)';
          warpBtn.style.borderColor = 'rgba(255, 220, 0, 0.8)';
        } else {
          warpBtn.textContent = '曲率模式 OFF';
          warpBtn.style.background = '';
          warpBtn.style.borderColor = '';
        }
      });
    }

    const athenaBtn = document.getElementById('athena-btn');
    const athenaNavLabel = document.getElementById('athena-nav-label');
    const planetList = ['水星', '金星', '火星', '木星', '土星', '天王星', '海王星', '冥王星'];
    
    function updateNavLabel() {
      if (athenaNavLabel) {
        athenaNavLabel.textContent = `导航至 ${gameState.targetPlanet}`;
      }
    }
    
    updateNavLabel();
    
    if (athenaBtn) {
      let clickCount = 0;
      let clickTimeout = null;
      
      athenaBtn.addEventListener('click', () => {
        clickCount++;
        if (clickTimeout) clearTimeout(clickTimeout);
        
        if (clickCount === 1) {
          clickTimeout = setTimeout(() => {
            const panel = document.getElementById('athena-panel');
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
              athenaBtn.classList.add('hidden');
              if (!gameState.currentDialogue) {
                showAthenaDialogue('default');
              }
            } else {
              athenaBtn.classList.remove('hidden');
            }
            clickCount = 0;
          }, 300);
        } else {
          clearTimeout(clickTimeout);
          const currentIndex = planetList.indexOf(gameState.targetPlanet);
          const nextIndex = (currentIndex + 1) % planetList.length;
          gameState.targetPlanet = planetList[nextIndex];
          updateNavLabel();
          speakDialogue(`航线已更新，目标：${gameState.targetPlanet}。正在重新规划最优路径。`, 'athena');
          clickCount = 0;
        }
      });
    }

    const storyLogBtn = document.getElementById('story-log-btn');
    if (storyLogBtn) {
      storyLogBtn.addEventListener('click', () => {
        const log = document.getElementById('story-log');
        log.classList.toggle('active');
      });
    }
    console.log('✅ 所有事件绑定成功');
  </script>
