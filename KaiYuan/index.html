<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星际拓荒者：奥德赛计划</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    #start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      overflow: hidden;
    }
    #start-screen::before {
      content: '';
      position: absolute;
      width: 300%;
      height: 300%;
      background: radial-gradient(circle at 50% 50%, rgba(100, 150, 255, 0.03) 0%, transparent 50%);
      animation: pulse 8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }
    #stars-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.5);
      animation: floatStar 4s ease-in-out infinite;
    }
    @keyframes floatStar {
      0%, 100% {
        transform: translate(0, 0);
        opacity: 0.3;
      }
      25% {
        transform: translate(5px, -5px);
        opacity: 0.8;
      }
      50% {
        transform: translate(-3px, 8px);
        opacity: 0.5;
      }
      75% {
        transform: translate(8px, 3px);
        opacity: 0.7;
      }
    }
    #start-screen h1 {
      font-size: 5rem;
      font-family: 'KaiTi', 'STKaiti', '楷体', serif;
      font-weight: bold;
      letter-spacing: 8px;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 30px rgba(100, 180, 255, 0.5), 0 2px 10px rgba(0,0,0,0.5);
      position: relative;
      z-index: 10;
    }
    #start-screen .subtitle {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 3rem;
      position: relative;
      z-index: 10;
    }
    #start-screen .rocket-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: bounce 2s ease-in-out infinite;
      position: relative;
      z-index: 10;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    #start-btn {
      padding: 16px 48px;
      font-size: 1.4rem;
      font-family: 'KaiTi', 'STKaiti', '楷体', serif;
      font-weight: 600;
      letter-spacing: 2px;
      color: #fff;
      background: linear-gradient(135deg, #4a90d9 0%, #357abd 100%);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(74, 144, 217, 0.4), 0 0 40px rgba(74, 144, 217, 0.2);
      position: relative;
      z-index: 10;
      overflow: hidden;
      margin-bottom: 20px;
    }
    #start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(74, 144, 217, 0.6), 0 0 60px rgba(74, 144, 217, 0.3);
      background: linear-gradient(135deg, #5a9fe9 0%, #4589cd 100%);
    }
    #start-btn:active {
      transform: translateY(0);
    }
    #tips-btn {
      padding: 16px 48px;
      font-size: 1.4rem;
      font-family: 'KaiTi', 'STKaiti', '楷体', serif;
      font-weight: 600;
      letter-spacing: 2px;
      color: #fff;
      background: linear-gradient(135deg, #4a90d9 0%, #357abd 100%);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(74, 144, 217, 0.4), 0 0 40px rgba(74, 144, 217, 0.2);
      position: relative;
      z-index: 10;
      overflow: hidden;
    }
    #tips-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(74, 144, 217, 0.6), 0 0 60px rgba(74, 144, 217, 0.3);
      background: linear-gradient(135deg, #5a9fe9 0%, #4589cd 100%);
    }
    #tips-btn:active {
      transform: translateY(0);
    }
    #start-screen .controls-info {
      margin-top: 3rem;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      text-align: center;
      line-height: 2;
      position: relative;
      z-index: 1;
    }
    #start-screen .controls-info kbd {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 4px 8px;
      margin: 0 4px;
      font-family: monospace;
      font-size: 0.85rem;
    }
    canvas {
      display: block;
      pointer-events: none;
    }
    canvas.game-active {
      pointer-events: auto;
    }
    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      font-size: 14px;
      line-height: 1.6;
      max-width: 320px;
    }
    #hud .label {
      color: #9ecfff;
      font-weight: 600;
    }
    #hud .value {
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
    #fuel-bar-bg {
      width: 200px;
      height: 12px;
      background: rgba(255,255,255,0.15);
      border-radius: 6px;
      margin-top: 6px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.25);
    }
    #fuel-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #ff4d4d, #ffcc00, #4dff88);
      transform-origin: left;
      transform: scaleX(1);
      transition: transform 0.1s linear;
    }
    #instructions {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      opacity: 0.9;
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    #instructions kbd {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      padding: 2px 6px;
      margin: 0 2px;
      font-family: monospace;
      font-weight: bold;
    }
    #antigravity-btn {
      position: absolute;
      right: 16px;
      bottom: 172px;
      width: 140px;
      padding: 10px 0;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      background: rgba(0, 150, 255, 0.3);
      border: 2px solid rgba(0, 180, 255, 0.5);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
      display: none;
    }
    #antigravity-btn:hover {
      background: rgba(0, 150, 255, 0.5);
      border-color: rgba(0, 200, 255, 0.8);
      box-shadow: 0 0 15px rgba(0, 180, 255, 0.4);
    }
    #antigravity-btn.active {
      background: rgba(0, 255, 150, 0.4);
      border-color: rgba(0, 255, 180, 0.8);
      box-shadow: 0 0 20px rgba(0, 255, 150, 0.5);
    }
    #warp-btn {
      position: absolute;
      right: 16px;
      bottom: 222px;
      width: 140px;
      padding: 10px 0;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      background: rgba(150, 0, 255, 0.3);
      border: 2px solid rgba(180, 0, 255, 0.5);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
      display: none;
    }
    #warp-btn:hover {
      background: rgba(150, 0, 255, 0.5);
      border-color: rgba(200, 0, 255, 0.8);
      box-shadow: 0 0 15px rgba(180, 0, 255, 0.4);
    }
    #warp-btn.active {
      background: rgba(255, 0, 200, 0.4);
      border-color: rgba(255, 0, 220, 0.8);
      box-shadow: 0 0 20px rgba(0, 255, 150, 0.5);
    }
    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
    }
    #settings-btn {
      position: absolute;
      bottom: 24px;
      left: 16px;
      width: 48px;
      height: 48px;
      background: rgba(0, 20, 40, 0.6);
      border: 1px solid rgba(100, 200, 255, 0.3);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: rgba(255,255,255,0.8);
      transition: all 0.3s;
    }
    #settings-btn:hover {
      background: rgba(100, 200, 255, 0.3);
      border-color: rgba(100, 200, 255, 0.5);
    }
    #settings-panel {
      position: absolute;
      bottom: 72px;
      left: 16px;
      width: 280px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 16px;
      display: none;
      backdrop-filter: blur(10px);
    }
    #settings-panel h3 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #9ecfff;
    }
    .setting-item {
      margin-bottom: 12px;
    }
    .setting-item label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: rgba(255,255,255,0.7);
    }
    .setting-item input[type="range"] {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      outline: none;
      -webkit-appearance: none;
    }
    .setting-item input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #9ecfff;
      border-radius: 50%;
      cursor: pointer;
    }
    .setting-item .value {
      font-size: 12px;
      color: #9ecfff;
      margin-top: 2px;
    }
    .setting-item button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      color: rgba(255,255,255,0.8);
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .setting-item button:hover {
      background: rgba(255,255,255,0.2);
    }
    .slider-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .slider-container label {
      font-size: 1em;
      color: rgba(255,255,255,0.8);
    }
    .slider-container input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.1);
      outline: none;
      -webkit-appearance: none;
    }
    .slider-container input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #64b4ff;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(100, 180, 255, 0.5);
    }
    .slider-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.85em;
      color: rgba(255,255,255,0.5);
    }
    .rocket-types {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .rocket-type-card {
      position: relative;
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
    }
    .rocket-type-card:hover {
      border-color: rgba(100, 180, 255, 0.4);
      background: rgba(100, 180, 255, 0.05);
      transform: translateY(-2px);
    }
    .rocket-type-card.selected {
      border-color: #64b4ff;
      background: rgba(100, 180, 255, 0.1);
      box-shadow: 0 0 20px rgba(100, 180, 255, 0.2);
    }
    .rocket-type-card input[type="radio"] {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #64b4ff;
    }
    .rocket-type-icon {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    .rocket-type-name {
      font-size: 1.3em;
      font-weight: bold;
      color: #fff;
      margin-bottom: 5px;
    }
    .rocket-type-desc {
      font-size: 0.9em;
      color: rgba(255,255,255,0.6);
      margin-bottom: 10px;
    }
    .rocket-type-stats {
      display: flex;
      gap: 20px;
      font-size: 0.85em;
      color: rgba(255,255,255,0.5);
    }
    .rocket-type-stats span {
      background: rgba(0,0,0,0.3);
      padding: 5px 10px;
      border-radius: 4px;
    }
    .rocket-info {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
    }
    .info-label {
      color: rgba(255,255,255,0.6);
      font-size: 0.95em;
    }
    .info-value {
      color: #fff;
      font-weight: bold;
      font-size: 0.95em;
    }
    .info-item.highlight {
      background: rgba(100, 180, 255, 0.1);
      border: 1px solid rgba(100, 180, 255, 0.2);
    }
    .info-item.highlight .info-value {
      color: #64b4ff;
    }
    .slider-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.85em;
      color: rgba(255,255,255,0.5);
    }
    .preview-section {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .preview-card {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 15px;
    }
    .preview-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .preview-item:last-child {
      border-bottom: none;
    }
    .preview-item .label {
      color: rgba(255,255,255,0.6);
    }
    .preview-item .value {
      color: #fff;
      font-weight: bold;
    }
    .preview-item.highlight .value {
      color: #64b4ff;
      font-size: 1.2em;
    }
    .builder-footer {
      margin-top: 30px;
    }
    #start-mission {
      background: linear-gradient(135deg, #64b4ff 0%, #4a9eff 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1.3em;
      padding: 15px 60px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(100, 180, 255, 0.4);
    }
    #start-mission:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 30px rgba(100, 180, 255, 0.6);
    }

    #center-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 10000;
      flex-direction: column;
    }
    #center-screen.active {
      display: flex;
    }
    .center-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      background: linear-gradient(180deg, rgba(30,30,50,0.95) 0%, rgba(20,20,40,0.95) 100%);
      border-bottom: 1px solid rgba(100,180,255,0.2);
    }
    .center-header h2 {
      font-size: 1.8em;
      color: #fff;
      margin: 0;
      text-shadow: 0 0 20px rgba(100, 180, 255, 0.5);
    }
    #center-close {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      width: 35px;
      height: 35px;
      color: #fff;
      font-size: 1.2em;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    #center-close:hover {
      background: rgba(255,60,60,0.5);
      border-color: rgba(255,100,100,0.5);
    }
    .center-content {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }
    .center-panel {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 25px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .center-panel h3 {
      font-size: 1.3em;
      color: #64b4ff;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(100,180,255,0.3);
      padding-bottom: 10px;
    }
    .center-panel p {
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
      margin: 10px 0;
    }
    .center-btn {
      background: linear-gradient(135deg, rgba(100,180,255,0.3) 0%, rgba(74,158,255,0.2) 100%);
      border: 1px solid rgba(100,180,255,0.4);
      border-radius: 6px;
      color: #64b4ff;
      font-size: 1em;
      padding: 10px 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    .center-btn:hover {
      background: linear-gradient(135deg, rgba(100,180,255,0.5) 0%, rgba(74,158,255,0.4) 100%);
      color: #fff;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }
    .stat-item {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }
    .stat-value {
      font-size: 1.5em;
      font-weight: bold;
      color: #fff;
    }
    .stat-label {
      font-size: 0.85em;
      color: rgba(255,255,255,0.5);
      margin-top: 5px;
    }
    #athena-panel {
    position: fixed;
    bottom: 340px;
    right: 16px;
    width: 320px;
    background: rgba(0, 20, 40, 0.9);
    border: 1px solid rgba(100, 200, 255, 0.3);
    border-radius: 12px;
    padding: 16px;
    z-index: 10002;
    backdrop-filter: blur(10px);
    display: none;
    pointer-events: auto;
  }
  #athena-panel.active {
    display: block;
  }
  .athena-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(100, 200, 255, 0.2);
  }
  .athena-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4a90d9, #00ffff);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 15px rgba(100, 200, 255, 0.5);
    transition: transform 0.3s ease;
  }
  .athena-icon.breathing {
    animation: breathe 2s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% {
      transform: scale(1);
      box-shadow: 0 0 15px rgba(100, 200, 255, 0.5);
    }
    50% {
      transform: scale(1.15);
      box-shadow: 0 0 25px rgba(100, 200, 255, 0.8);
    }
  }
  .athena-name {
    font-size: 14px;
    font-weight: bold;
    color: #64b4ff;
    text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
  }
  .athena-status {
    font-size: 11px;
    color: rgba(100, 200, 255, 0.6);
  }
  .athena-message {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
    line-height: 1.6;
    margin-bottom: 12px;
    min-height: 40px;
  }
  .athena-choices {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .athena-choice {
    background: rgba(100, 200, 255, 0.1);
    border: 1px solid rgba(100, 200, 255, 0.3);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.8);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
  }
  .athena-choice:hover {
    background: rgba(100, 200, 255, 0.25);
    border-color: rgba(100, 200, 255, 0.6);
  }
  .athena-choice.selected {
    background: rgba(100, 200, 255, 0.3);
    border-color: #64b4ff;
  }
  #athena-btn {
    position: absolute;
    bottom: 240px;
    right: 16px;
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, rgba(74, 144, 217, 0.8), rgba(0, 255, 255, 0.8));
    border: 2px solid rgba(100, 200, 255, 0.5);
    border-radius: 50%;
    color: #fff;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 100;
    transition: all 0.3s;

  <script>
    // ================= 星星背景动画 =================
    (function() {
      const container = document.getElementById('start-screen');
      if (!container) return;

      const starCount = 150;
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = (Math.random() * 3 + 1) + 'px';
        star.style.height = star.style.width;
        star.style.animationDelay = Math.random() * 5 + 's';
        star.style.animationDuration = (Math.random() * 3 + 2) + 's';
        star.style.opacity = Math.random() * 0.5 + 0.3;
        container.appendChild(star);
      }

      window.stopStars = function() {};
    })();

    // ================= 工具函数 =================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    const PI = Math.PI;
    const rand = (min, max) => Math.random() * (max - min) + min;
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

    class Vec2 {
      constructor(x, y) { this.x = x; this.y = y; }
      add(v) { return new Vec2(this.x + v.x, this.y + v.y); }
      sub(v) { return new Vec2(this.x - v.x, this.y - v.y); }
      mul(s) { return new Vec2(this.x * s, this.y * s); }
      div(s) { return new Vec2(this.x / s, this.y / s); }
      mag() { return Math.hypot(this.x, this.y); }
      normalize() {
        const m = this.mag();
        return m > 0 ? this.div(m) : new Vec2(0, 0);
      }
      dist(v) { return Math.hypot(this.x - v.x, this.y - v.y); }
      rotate(angle) {
        const c = Math.cos(angle), s = Math.sin(angle);
        return new Vec2(this.x * c - this.y * s, this.x * s + this.y * c);
      }
    }

    // ================= 输入 =================
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    // 鼠标滚轮缩放
    let mouseSensitivity = 0.5;
    window.addEventListener('wheel', e => {
      e.preventDefault();
      const zoomSpeed = 1 + mouseSensitivity;
      if (e.deltaY < 0) {
        camera.targetManualZoom *= zoomSpeed;
      } else {
        camera.targetManualZoom /= zoomSpeed;
      }
      camera.targetManualZoom = clamp(camera.targetManualZoom, ZOOM_MIN, ZOOM_MAX);
    }, { passive: false });

    // ================= 设置面板 =================
    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const sensitivitySlider = document.getElementById('sensitivity-slider');
    const sensitivityValue = document.getElementById('sensitivity-value');
    const timeSlider = document.getElementById('time-slider');
    const timeValue = document.getElementById('time-value');
    const resetSettingsBtn = document.getElementById('reset-settings');

    let timeSpeed = 1;

    settingsBtn.addEventListener('click', () => {
      settingsPanel.style.display = settingsPanel.style.display === 'block' ? 'none' : 'block';
    });

    sensitivitySlider.addEventListener('input', (e) => {
      mouseSensitivity = parseFloat(e.target.value);
      sensitivityValue.textContent = Math.round(mouseSensitivity * 100) + '%';
    });

    timeSlider.addEventListener('input', (e) => {
      timeSpeed = parseFloat(e.target.value);
      const daysPerSec = GAME_DAYS_PER_SECOND * timeSpeed;
      timeValue.textContent = (daysPerSec >= 1 ? Math.round(daysPerSec) : daysPerSec.toFixed(1)) + ' 天/秒';
    });

    resetSettingsBtn.addEventListener('click', () => {
      mouseSensitivity = 0.5;
      timeSpeed = 1;
      sensitivitySlider.value = 0.5;
      sensitivityValue.textContent = '50%';
      timeSlider.value = 1;
      timeValue.textContent = GAME_DAYS_PER_SECOND.toFixed(1) + ' 天/秒';
    });

    // 点击其他地方关闭设置面板
    document.addEventListener('click', (e) => {
      if (!settingsBtn.contains(e.target) && !settingsPanel.contains(e.target)) {
        settingsPanel.style.display = 'none';
      }
    });

    // ================= 世界参数 =================
    const SCALE = 1;
    const G = 0.0015;
    const EARTH_RADIUS = 6371;
    const EARTH_MASS = 350000000;
    const ROCKET_HEIGHT = 0.1;
    const ROCKET_WIDTH = 0.0101;
    let MAX_FUEL = 200;
    let FUEL_BURN = 0.003;
    let THRUST_FORCE = 0.0132;
    const ROCKET_VISUAL_SCALE = 1.5; // 视觉放大倍数：当前为真实比例，火箭默认视图下几乎不可见
    const ROCKET_HALF_HEIGHT = ROCKET_HEIGHT * ROCKET_VISUAL_SCALE / 2; // 碰撞与停靠用的视觉半高
    const ROCKET_HALF_WIDTH = ROCKET_WIDTH * ROCKET_VISUAL_SCALE / 2; // 视觉半宽
    const ROTATION_SPEED = 0.006;
    const ZOOM_MIN = 0.00000005;
    const ZOOM_MAX = 100000;

    const LAUNCH_PAD_ANGLE = -PI / 2; // 地球正上方

    function getPlanetVelocity(planet) {
      if (planet.vel) return planet.vel;
      if (planet.orbitPeriod > 0 && planet.orbitCenter) {
        const angularSpeed = (PI * 2 / planet.orbitPeriod) * timeSpeed;
        return new Vec2(
          -Math.sin(planet.orbitAngle) * planet.orbitRadius * angularSpeed,
          Math.cos(planet.orbitAngle) * planet.orbitRadius * angularSpeed
        );
      }
      return new Vec2(0, 0);
    }

    // ================= 实体 =================
    class Planet {
      constructor(x, y, radius, color, name, mass, landColor = null, orbitRadius = 0, orbitPeriod = 0, orbitAngle = 0, orbitCenter = null) {
        this.radius = radius;
        this.color = color;
        this.name = name;
        this.mass = mass;
        this.visited = false;
        this.atmosphere = radius * 1.35;
        this.landColor = landColor;
        this.rings = null;
        this.land = [];
        // 地形细节
        this.spots = [];
        for (let i = 0; i < 6; i++) {
          this.spots.push({
            angle: rand(0, PI * 2),
            dist: rand(0.3, 0.8),
            size: rand(0.08, 0.18),
            color: 'rgba(0,0,0,0.15)'
          });
        }
        // 公转轨道参数
        this.orbitRadius = orbitRadius;
        this.orbitPeriod = orbitPeriod;
        this.orbitAngle = orbitAngle;
        this.orbitCenter = orbitCenter;
        // 根据轨道参数自动计算初始位置和速度
        if (orbitPeriod > 0 && orbitCenter) {
          const px = orbitCenter.pos.x + Math.cos(orbitAngle) * orbitRadius;
          const py = orbitCenter.pos.y + Math.sin(orbitAngle) * orbitRadius;
          this.pos = new Vec2(px, py);
          const angularSpeed = (PI * 2 / orbitPeriod);
          this.vel = new Vec2(
            -Math.sin(orbitAngle) * orbitRadius * angularSpeed,
            Math.cos(orbitAngle) * orbitRadius * angularSpeed
          );
        } else {
          this.pos = new Vec2(x, y);
          this.vel = new Vec2(0, 0);
        }
      }

      updateOrbit(speedMultiplier = 1) {
        if (this.orbitPeriod > 0 && this.orbitCenter) {
          const angularSpeed = (PI * 2 / this.orbitPeriod) * speedMultiplier;
          this.orbitAngle += angularSpeed;
          const px = this.orbitCenter.pos.x + Math.cos(this.orbitAngle) * this.orbitRadius;
          const py = this.orbitCenter.pos.y + Math.sin(this.orbitAngle) * this.orbitRadius;
          this.pos = new Vec2(px, py);
          this.vel = new Vec2(
            -Math.sin(this.orbitAngle) * this.orbitRadius * angularSpeed,
            Math.cos(this.orbitAngle) * this.orbitRadius * angularSpeed
          );
        }
      }

      addLand(x, y, rx, ry, rotation = 0, color = null) {
        this.land.push({ x, y, rx, ry, rotation, color });
      }

      setRings(innerRadius, outerRadius, color) {
        this.rings = { inner: innerRadius, outer: outerRadius, color };
      }

      draw(ctx, camera) {
        const screenPos = camera.worldToScreen(this.pos);
        const r = this.radius * camera.zoom;

        if (this.name === '地球' && r > 3) {
          this.drawEarth(ctx, screenPos, r, camera);
          return;
        }

        const drawR = Math.max(0.5, r);

        ctx.save();
        ctx.beginPath();
        ctx.arc(screenPos.x, screenPos.y, drawR, 0, PI * 2);
        ctx.clip();

        const lightX = screenPos.x - drawR * 0.3;
        const lightY = screenPos.y - drawR * 0.3;

        const mainGrad = ctx.createRadialGradient(
          lightX, lightY, 0,
          screenPos.x, screenPos.y, drawR
        );
        mainGrad.addColorStop(0, lighten(this.color, 70));
        mainGrad.addColorStop(0.2, lighten(this.color, 40));
        mainGrad.addColorStop(0.5, this.color);
        mainGrad.addColorStop(0.8, darken(this.color, 40));
        mainGrad.addColorStop(1, darken(this.color, 70));
        ctx.fillStyle = mainGrad;
        ctx.fill();

        ctx.restore();

        if (r < 1) return;

        // 3D高光
        const highlightGrad = ctx.createRadialGradient(
          screenPos.x - drawR * 0.25, screenPos.y - drawR * 0.25, 0,
          screenPos.x - drawR * 0.25, screenPos.y - drawR * 0.25, drawR * 0.15
        );
        highlightGrad.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
        highlightGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.3)');
        highlightGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = highlightGrad;
        ctx.beginPath();
        ctx.arc(screenPos.x, screenPos.y, drawR, 0, PI * 2);
        ctx.fill();

        // 大气层
        const atm = this.atmosphere * camera.zoom;
        const gradAtm = ctx.createRadialGradient(screenPos.x, screenPos.y, r, screenPos.x, screenPos.y, atm);
        gradAtm.addColorStop(0, this.color.replace(')', ', 0.35)').replace('rgb', 'rgba'));
        gradAtm.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gradAtm;
        ctx.beginPath();
        ctx.arc(screenPos.x, screenPos.y, atm, 0, PI * 2);
        ctx.fill();

        if (this.name === '太阳') {
          const glow = ctx.createRadialGradient(screenPos.x, screenPos.y, r, screenPos.x, screenPos.y, r * 4);
          glow.addColorStop(0, 'rgba(255, 240, 200, 0.7)');
          glow.addColorStop(0.4, 'rgba(255, 180, 80, 0.3)');
          glow.addColorStop(1, 'rgba(255, 100, 0, 0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(screenPos.x, screenPos.y, r * 4, 0, PI * 2);
          ctx.fill();
        }

        if (this.rings) {
          const innerR = this.rings.inner * r;
          const outerR = this.rings.outer * r;
          ctx.save();
          ctx.translate(screenPos.x, screenPos.y);
          ctx.rotate(0.4);
          ctx.scale(1, 0.35);
          ctx.beginPath();
          ctx.arc(0, 0, (innerR + outerR) / 2, 0, PI * 2);
          ctx.strokeStyle = this.rings.color;
          ctx.lineWidth = outerR - innerR;
          ctx.globalAlpha = 0.75;
          ctx.stroke();
          ctx.restore();
        }

        // 陆地
        if (this.land && this.land.length > 0) {
          ctx.save();
          ctx.beginPath();
          ctx.arc(screenPos.x, screenPos.y, r, 0, PI * 2);
          ctx.clip();
          for (const l of this.land) {
            ctx.save();
            ctx.translate(screenPos.x + l.x * r, screenPos.y + l.y * r);
            ctx.rotate(l.rotation);
            const landColor = l.color || this.landColor || 'rgba(72, 187, 120, 0.9)';
            const distFromLight = Math.sqrt(Math.pow(l.x - 0.3, 2) + Math.pow(l.y - 0.3, 2));
            const lightFactor = 1 - Math.min(distFromLight, 1);
            const adjustedColor = hexToRgb(landColor.replace('rgba', '').replace('rgb', '').replace(')', '').replace('(', ''));
            if (adjustedColor) {
              const lightenedR = Math.min(255, adjustedColor.r + lightFactor * 30);
              const lightenedG = Math.min(255, adjustedColor.g + lightFactor * 30);
              const lightenedB = Math.min(255, adjustedColor.b + lightFactor * 30);
              ctx.fillStyle = `rgba(${lightenedR}, ${lightenedG}, ${lightenedB}, 0.9)`;
            } else {
              ctx.fillStyle = landColor;
            }
            ctx.beginPath();
            ctx.ellipse(0, 0, l.rx * r, l.ry * r, 0, 0, PI * 2);
            ctx.fill();
            ctx.restore();
          }
          ctx.restore();
        }

        // 斑点
        ctx.save();
        ctx.beginPath();
        ctx.arc(screenPos.x, screenPos.y, r, 0, PI * 2);
        ctx.clip();
        for (const s of this.spots) {
          const sx = screenPos.x + Math.cos(s.angle) * r * s.dist;
          const sy = screenPos.y + Math.sin(s.angle) * r * s.dist;
          const distFromLight = Math.sqrt(Math.pow(sx - lightX, 2) + Math.pow(sy - lightY, 2));
          const lightFactor = 1 - Math.min(distFromLight / drawR, 1);
          const adjustedColor = hexToRgb(s.color.replace('rgba', '').replace('rgb', '').replace(')', '').replace('(', ''));
          if (adjustedColor) {
            const lightenedR = Math.min(255, adjustedColor.r + lightFactor * 20);
            const lightenedG = Math.min(255, adjustedColor.g + lightFactor * 20);
            const lightenedB = Math.min(255, adjustedColor.b + lightFactor * 20);
            ctx.fillStyle = `rgba(${lightenedR}, ${lightenedG}, ${lightenedB}, 0.9)`;
          } else {
            ctx.fillStyle = s.color;
          }
          ctx.beginPath();
          ctx.arc(sx, sy, r * s.size, 0, PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      drawEarth(ctx, screenPos, r, camera) {
        ctx.save();

        // 使用预加载的地球纹理图片
        if (earthTexture && earthTextureLoaded) {
          ctx.save();
          ctx.beginPath();
          ctx.arc(screenPos.x, screenPos.y, r, 0, PI * 2);
          ctx.clip();

          // 绘制地球纹理

            screenPos.x - r,

          );

          ctx.restore();
        } else {
          // 备用方案：详细绘制地球

          const continents = [
            // 北美洲
            { points: [[-0.82,-0.32],[-0.78,-0.42],[-0.65,-0.48],[-0.48,-0.42],[-0.35,-0.28],[-0.28,-0.12],[-0.35,0.08],[-0.52,0.18],[-0.65,0.08],[-0.75,-0.08],[-0.82,-0.18],[-0.82,-0.32]], color: '#2e6b2e' },

            // 非洲
            { points: [[0.08,0.12],[0.32,0.12],[0.48,0.32],[0.58,0.52],[0.48,0.72],[0.32,0.62],[0.08,0.42],[-0.02,0.22],[0.08,0.12]], color: '#c9a85c' },
            // 亚洲
            { points: [[0.42,-0.38],[0.72,-0.28],[0.82,-0.18],[0.88,0.02],[0.78,0.22],[0.62,0.32],[0.48,0.12],[0.38,0.02],[0.32,-0.18],[0.42,-0.38]], color: '#3d7b3d' },
            // 澳大利亚
            { points: [[0.62,0.52],[0.82,0.52],[0.92,0.62],[0.82,0.72],[0.62,0.72],[0.52,0.62],[0.62,0.52]], color: '#b8944c' },
            // 格陵兰
            { points: [[-0.58,-0.62],[-0.38,-0.62],[-0.28,-0.52],[-0.38,-0.42],[-0.58,-0.42],[-0.68,-0.52],[-0.58,-0.62]], color: '#e8e8e8' },
          ];

          for (const continent of continents) {
            ctx.save();
            ctx.translate(screenPos.x, screenPos.y);
            ctx.scale(r, r);

            // 陆地渐变
            const landGrad = ctx.createLinearGradient(-1, -1, 1, 1);
            landGrad.addColorStop(0, lighten(continent.color, 15));
            landGrad.addColorStop(0.5, continent.color);
            landGrad.addColorStop(1, darken(continent.color, 15));

            ctx.fillStyle = landGrad;
            ctx.beginPath();
            ctx.moveTo(continent.points[0][0], continent.points[0][1]);
            for (let i = 1; i < continent.points.length; i++) {
              ctx.lineTo(continent.points[i][0], continent.points[i][1]);
            }
            ctx.closePath();
            ctx.fill();

            ctx.restore();
          }

          // 3. 冰盖（南极）
          ctx.fillStyle = '#f5f5f5';
          ctx.beginPath();
          ctx.arc(screenPos.x, screenPos.y + r * 0.85, r * 0.18, 0, PI * 2);
          ctx.fill();

          // 4. 云层
          const clouds = [
            { x: -0.45, y: -0.22, rx: 0.14, ry: 0.06 },
            { x: 0.18, y: -0.32, rx: 0.18, ry: 0.05 },
            { x: 0.52, y: 0.12, rx: 0.16, ry: 0.05 },
            { x: -0.12, y: 0.38, rx: 0.12, ry: 0.04 },
            { x: 0.72, y: 0.48, rx: 0.1, ry: 0.04 },
            { x: -0.62, y: 0.12, rx: 0.08, ry: 0.03 },
          ];

          for (const cloud of clouds) {
            const cloudGrad = ctx.createRadialGradient(
              screenPos.x + cloud.x * r, screenPos.y + cloud.y * r, 0,
              screenPos.x + cloud.x * r, screenPos.y + cloud.y * r, cloud.rx * r
            );
            cloudGrad.addColorStop(0, 'rgba(255, 255, 255, 0.65)');
            cloudGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.35)');
            cloudGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = cloudGrad;
            ctx.beginPath();
            ctx.ellipse(screenPos.x + cloud.x * r, screenPos.y + cloud.y * r, cloud.rx * r, cloud.ry * r, 0, 0, PI * 2);
            ctx.fill();
          }

          ctx.restore();
        }

        // 球面光影效果（模拟太阳光照）
        const shadowGrad = ctx.createLinearGradient(
          screenPos.x - r, screenPos.y,
          screenPos.x + r, screenPos.y
        );
        shadowGrad.addColorStop(0, 'rgba(0, 0, 0, 0)');
        shadowGrad.addColorStop(0.45, 'rgba(0, 0, 0, 0)');
        shadowGrad.addColorStop(0.55, 'rgba(0, 0, 0, 0.12)');
        shadowGrad.addColorStop(1, 'rgba(0, 0, 0, 0.35)');
        ctx.fillStyle = shadowGrad;
        ctx.beginPath();
        ctx.arc(screenPos.x, screenPos.y, r, 0, PI * 2);
        ctx.fill();

        // 大气层光晕
        const atmR = r * 1.1;
        const atmGrad = ctx.createRadialGradient(screenPos.x, screenPos.y, r, screenPos.x, screenPos.y, atmR);
        atmGrad.addColorStop(0, 'rgba(80, 160, 255, 0.22)');
        atmGrad.addColorStop(0.5, 'rgba(60, 140, 255, 0.1)');
        atmGrad.addColorStop(1, 'rgba(40, 100, 200, 0)');
        ctx.fillStyle = atmGrad;
        ctx.beginPath();
        ctx.arc(screenPos.x, screenPos.y, atmR, 0, PI * 2);
        ctx.fill();

        // 边缘高光（大气散射）
        const edgeGrad = ctx.createRadialGradient(screenPos.x, screenPos.y, r * 0.9, screenPos.x, screenPos.y, r);
        edgeGrad.addColorStop(0, 'rgba(255, 255, 255, 0)');
        edgeGrad.addColorStop(0.5, 'rgba(180, 210, 255, 0.05)');
        edgeGrad.addColorStop(1, 'rgba(140, 190, 255, 0.2)');
        ctx.fillStyle = edgeGrad;
        ctx.beginPath();
        ctx.arc(screenPos.x, screenPos.y, r, 0, PI * 2);
        ctx.fill();

        // 3D高光
        const highlightGrad = ctx.createRadialGradient(
          screenPos.x - r * 0.25, screenPos.y - r * 0.25, 0,
          screenPos.x - r * 0.25, screenPos.y - r * 0.25, r * 0.15
        );
        highlightGrad.addColorStop(0, 'rgba(255, 255, 255, 0.7)');
        highlightGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.25)');
        highlightGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = highlightGrad;
        ctx.beginPath();
        ctx.arc(screenPos.x, screenPos.y, r, 0, PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    // 预加载地球纹理图片（本地文件）
    const earthTexture = new Image();
    let earthTextureLoaded = false;
    earthTexture.onload = () => {
      earthTextureLoaded = true;
      console.log('地球纹理加载成功');
    };
    earthTexture.onerror = () => {
      console.log('地球纹理加载失败，使用备用渲染');
      earthTextureLoaded = false;
    };
    earthTexture.src = 'earth_texture.jpg';

    class Rocket {
      constructor(planet, startAngle) {
        this.planet = planet;
        this.startAngle = startAngle;
        this.reset();
      }

      reset() {
        const normal = new Vec2(Math.cos(this.startAngle), Math.sin(this.startAngle));
        this.planet = earth;
        this.pos = earth.pos.add(normal.mul(earth.radius + ROCKET_HALF_HEIGHT));
        this.vel = getPlanetVelocity(earth);
        this.relVel = new Vec2(0, 0);
        this.angle = this.startAngle;
        this.fuel = MAX_FUEL;
        this.thrusting = false;
        this.landed = true;
        this.onLaunchPad = true;
        this.landedPlanet = null;
        this.crashed = false;
        this.crossedKarmenLine = false;
        this.dryMass = 0.08;
        this.fuelMass = 0.92;
        this.antiGravity = false;
        this.warpMode = false;
        this.warpProMode = false;
        this._autopilotControlled = false;
      }

      update(planets) {
        const thrusting = keys['Space'] || keys['KeyW'] || keys['ArrowUp'];
        this.thrusting = thrusting && this.fuel > 0;

        if (this.onLaunchPad) {
          if (this.thrusting || (gameState.autoPilot && gameState.targetPlanet)) {
            this.onLaunchPad = false;
            this.landed = false;
            this.relVel = new Vec2(0, 0);
            if (gameState.autoPilot && gameState.targetPlanet) {
              this._autopilotControlled = true;
              console.log('[Rocket] 自动导航脱离发射台');
            }
          } else {
            if (keys['KeyA'] || keys['ArrowLeft']) this.angle -= ROTATION_SPEED;
            if (keys['KeyD'] || keys['ArrowRight']) this.angle += ROTATION_SPEED;
            const normal = new Vec2(Math.cos(this.startAngle), Math.sin(this.startAngle));
            this.pos = this.planet.pos.add(normal.mul(this.planet.radius + ROCKET_HALF_HEIGHT));
            this.vel = getPlanetVelocity(this.planet);
            this.relVel = new Vec2(0, 0);
            return;
          }
        }

        if (this.landed && this.landedPlanet) {
          if (this.thrusting || (gameState.autoPilot && gameState.targetPlanet)) {
            this.landed = false;
            this.landedPlanet = null;
            this.relVel = new Vec2(0, 0);
            const normal = new Vec2(Math.cos(this.angle), Math.sin(this.angle));
            this.pos = this.pos.add(normal.mul(1000));
            if (gameState.autoPilot && gameState.targetPlanet) {
              this._autopilotControlled = true;
            }
          } else {
            if (keys['KeyA'] || keys['ArrowLeft']) this.angle -= ROTATION_SPEED;
            if (keys['KeyD'] || keys['ArrowRight']) this.angle += ROTATION_SPEED;
            const normal = new Vec2(Math.cos(this.angle), Math.sin(this.angle));
            this.pos = this.landedPlanet.pos.add(normal.mul(this.landedPlanet.radius + ROCKET_HALF_HEIGHT));
            this.vel = getPlanetVelocity(this.landedPlanet);
            this.relVel = new Vec2(0, 0);
            return;
          }
        }

        if (gameState.autoPilot && gameState.targetPlanet) {
          const targetPlanet = planets.find(p => p.name === gameState.targetPlanet);
          if (targetPlanet) {
            const targetPos = targetPlanet.pos;
            const toTarget = targetPos.sub(this.pos);
            const normal = toTarget.normalize();
            const targetPlanetVel = getPlanetVelocity(targetPlanet);
            
            this.pos = targetPlanet.pos.add(normal.mul(targetPlanet.radius + ROCKET_HALF_HEIGHT));
            this.vel = targetPlanetVel;
            this.relVel = new Vec2(0, 0);
            this.landed = true;
            this.landedPlanet = targetPlanet;
            this.angle = Math.atan2(normal.y, normal.x);
            if (!targetPlanet.visited && targetPlanet.name !== '地球') {
              targetPlanet.visited = true;
              showMessage(`到达 ${targetPlanet.name}！`);
            }
            gameState.autoPilot = false;
            gameState.targetPlanet = null;
            this._autopilotControlled = false;
            this.warpProMode = false;
            this.warpMode = false;
            this.antiGravity = false;
            return;
          }
        } else if (!gameState.autoPilot && this.warpProMode) {
          const warpProSpeed = 80000;
          if (keys['KeyW'] || keys['ArrowUp']) this.relVel.y -= warpProSpeed;
          if (keys['KeyS'] || keys['ArrowDown']) this.relVel.y += warpProSpeed;
          if (keys['KeyA'] || keys['ArrowLeft']) this.relVel.x -= warpProSpeed;
          if (keys['KeyD'] || keys['ArrowRight']) this.relVel.x += warpProSpeed;
          this.thrusting = true;
        } else if (!gameState.autoPilot && this.warpMode) {
          const warpSpeed = 2;
          if (keys['KeyW'] || keys['ArrowUp']) this.relVel.y -= warpSpeed;
          if (keys['KeyS'] || keys['ArrowDown']) this.relVel.y += warpSpeed;
          if (keys['KeyA'] || keys['ArrowLeft']) this.relVel.x -= warpSpeed;
          if (keys['KeyD'] || keys['ArrowRight']) this.relVel.x += warpSpeed;
          this.thrusting = true;
        } else if (!gameState.autoPilot && this.antiGravity) {
          const antiGravityAccel = 0.05;
          if (keys['KeyW'] || keys['ArrowUp']) this.relVel.y -= antiGravityAccel;
          if (keys['KeyS'] || keys['ArrowDown']) this.relVel.y += antiGravityAccel;
          if (keys['KeyA'] || keys['ArrowLeft']) this.relVel.x -= antiGravityAccel;
          if (keys['KeyD'] || keys['ArrowRight']) this.relVel.x += antiGravityAccel;
          this.thrusting = true;
        } else if (!gameState.autoPilot) {
          if (keys['KeyA'] || keys['ArrowLeft']) this.angle -= ROTATION_SPEED;
          if (keys['KeyD'] || keys['ArrowRight']) this.angle += ROTATION_SPEED;

          if (this.thrusting) {
            const dir = new Vec2(Math.cos(this.angle), Math.sin(this.angle));
            const currentMass = this.dryMass + this.fuelMass * (this.fuel / MAX_FUEL);
            const acceleration = THRUST_FORCE / currentMass;
            this.relVel = this.relVel.add(dir.mul(acceleration));
            this.fuel = Math.max(0, this.fuel - FUEL_BURN);
          }
        }

        let nearestPlanet = null;
        let minDist = Infinity;
        for (const p of planets) {
          const d = this.pos.dist(p.pos);
          if (d < minDist) {
            minDist = d;
            nearestPlanet = p;
          }
        }

        if (!gameState.autoPilot && nearestPlanet && nearestPlanet !== this.planet) {
          const oldRefVel = getPlanetVelocity(this.planet || { orbitPeriod: 0 });
          const newRefVel = getPlanetVelocity(nearestPlanet);
          this.relVel = this.vel.sub(newRefVel);
          this.planet = nearestPlanet;
        }

        const currentPlanetVel = getPlanetVelocity(this.planet || { orbitPeriod: 0 });

        if (!this.warpMode && !this.warpProMode && !gameState.autoPilot) {
          for (const p of planets) {
            const d = this.pos.dist(p.pos);
            if (d > p.radius) {
              const dir = p.pos.sub(this.pos).normalize();
              const gravityAccel = G * p.mass / (d * d);
              const gravityDir = this.antiGravity ? dir.mul(-1) : dir;
              this.relVel = this.relVel.add(gravityDir.mul(gravityAccel));
            }
          }
        }

        const altitude = this.pos.dist(earth.pos) - EARTH_RADIUS;
        if (altitude < 100 && altitude > 0) {
          const density = Math.exp(-altitude / 50);
          const drag = this.relVel.mag() * density * 0.00005;
          this.relVel = this.relVel.mul(Math.max(0, 1 - drag));
        }

        if (!this._autopilotControlled) {
          this.vel = currentPlanetVel.add(this.relVel);
        }
        if (!this.landed && (!gameState.autoPilot || !gameState.targetPlanet)) {
          this.pos = this.pos.add(this.vel);
        }
        for (const p of planets) {
          const d = this.pos.dist(p.pos);
          if (d <= p.radius + ROCKET_HALF_HEIGHT) {
            const planetVel = getPlanetVelocity(p);
            const relVel = this.vel.sub(planetVel);
            const impactSpeed = relVel.mag();
            const normal = this.pos.sub(p.pos).normalize();
            if (impactSpeed < 5 && p.name !== '太阳') {
              this.landed = true;
              this.landedPlanet = p;
              this.pos = p.pos.add(normal.mul(p.radius + ROCKET_HALF_HEIGHT));
              this.vel = planetVel;
              this.relVel = new Vec2(0, 0);
              this.angle = Math.atan2(normal.y, normal.x);
              if (!p.visited && p.name !== '地球') {
                p.visited = true;
                showMessage(`到达 ${p.name}！`);
              }
              if (gameState.autoPilot && gameState.targetPlanet === p.name) {
                gameState.autoPilot = false;
                this._autopilotControlled = false;
                this.warpProMode = false;
                this.warpMode = false;
                this.antiGravity = false;
                const antiGravityBtn = document.getElementById('antigravity-btn');
                if (antiGravityBtn) {
                  antiGravityBtn.classList.remove('active');
                  antiGravityBtn.textContent = '反重力模式 OFF';
                }
                const warpBtn = document.getElementById('warp-btn');
                if (warpBtn) {
                  warpBtn.classList.remove('active');
                  warpBtn.textContent = '曲率模式 OFF';
                  warpBtn.style.background = '';
                  warpBtn.style.borderColor = '';
                }
              }
            } else {
              this.crashed = true;
              this.landedPlanet = null;
              this.vel = this.vel.sub(normal.mul(impactSpeed * 1.2));
              for (let i = 0; i < 20; i++) {
                particles.push(new Particle(
                  this.pos.x, this.pos.y,
                  this.vel.x + rand(-4, 4), this.vel.y + rand(-4, 4),
                  rand(0.5, 1.5),
                  `hsl(${rand(0, 60)}, 100%, 60%)`
                ));
              }
              showMessage('坠毁！按 R 重置');
            }
            break;
          }
        }
      }

      draw(ctx, camera) {
        const sp = camera.worldToScreen(this.pos);
        const z = camera.zoom;
        const halfH = ROCKET_HALF_HEIGHT * z;
        const halfW = ROCKET_HALF_WIDTH * z;

        ctx.save();
        ctx.translate(sp.x, sp.y);
        ctx.rotate(this.angle + PI / 2);

        if (this.thrusting) {
          const time = Date.now() * 0.003;
          const flicker = rand(0.85, 1.15);
          const engineSize = halfH * 0.3;
          const warpLength = halfH * 0.6 * flicker;
          
          ctx.globalCompositeOperation = 'screen';
          
          // 外层能量光晕 - 紫色/蓝色渐变
          const outerGlow = ctx.createRadialGradient(0, halfH * 0.6, 0, 0, halfH * 0.6, warpLength * 1.2);
          outerGlow.addColorStop(0, 'rgba(100, 50, 255, 0.3)');
          outerGlow.addColorStop(0.5, 'rgba(50, 100, 255, 0.15)');
          outerGlow.addColorStop(1, 'rgba(0, 50, 150, 0)');
          ctx.fillStyle = outerGlow;
          ctx.beginPath();
          ctx.ellipse(0, halfH * 0.6 + warpLength * 0.4, warpLength * 0.5, warpLength * 0.8, 0, 0, PI * 2);
          ctx.fill();
          
          // 空间扭曲效果 - 多层弧形波纹
          for (let i = 0; i < 3; i++) {
            const waveOffset = (time + i * 0.8) % 2;
            const waveAlpha = 0.3 - i * 0.08;
            const waveRadius = engineSize * (1 + waveOffset * 0.5);
            const waveY = halfH * 0.6 + waveOffset * warpLength * 0.3;
            
            const waveGrad = ctx.createLinearGradient(-waveRadius, waveY, waveRadius, waveY);
            waveGrad.addColorStop(0, `rgba(0, 200, 255, 0)`);
            waveGrad.addColorStop(0.3, `rgba(100, 150, 255, ${waveAlpha})`);
            waveGrad.addColorStop(0.5, `rgba(150, 100, 255, ${waveAlpha})`);
            waveGrad.addColorStop(0.7, `rgba(100, 150, 255, ${waveAlpha})`);
            waveGrad.addColorStop(1, `rgba(0, 200, 255, 0)`);
            
            ctx.strokeStyle = waveGrad;
            ctx.lineWidth = 2 + i * 1.5;
            ctx.beginPath();
            ctx.arc(0, waveY, waveRadius, PI * 0.15, PI * 0.85);
            ctx.stroke();
          }
          
          // 核心能量束 - 蓝色到紫色渐变
          const coreGrad = ctx.createLinearGradient(0, halfH * 0.55, 0, halfH * 0.6 + warpLength);
          coreGrad.addColorStop(0, 'rgba(0, 255, 255, 1)');
          coreGrad.addColorStop(0.2, 'rgba(0, 200, 255, 0.9)');
          coreGrad.addColorStop(0.4, 'rgba(50, 150, 255, 0.7)');
          coreGrad.addColorStop(0.6, 'rgba(100, 100, 255, 0.5)');
          coreGrad.addColorStop(0.8, 'rgba(150, 50, 255, 0.2)');
          coreGrad.addColorStop(1, 'rgba(200, 0, 255, 0)');
          
          ctx.fillStyle = coreGrad;
          
          // 主能量束形状
          ctx.beginPath();
          ctx.moveTo(-halfW * 0.4, halfH * 0.55);
          ctx.bezierCurveTo(
            -halfW * 0.8, halfH * 0.6 + warpLength * 0.3,
            -halfW * 0.6, halfH * 0.6 + warpLength,
            -halfW * 0.1, halfH * 0.6 + warpLength
          );
          ctx.lineTo(halfW * 0.1, halfH * 0.6 + warpLength);
          ctx.bezierCurveTo(
            halfW * 0.6, halfH * 0.6 + warpLength,
            halfW * 0.8, halfH * 0.6 + warpLength * 0.3,
            halfW * 0.4, halfH * 0.55
          );
          ctx.closePath();
          ctx.fill();
          
          // 内部能量核心 - 明亮的青色
          const innerCore = ctx.createRadialGradient(0, halfH * 0.58, 0, 0, halfH * 0.58, halfW * 0.5);
          innerCore.addColorStop(0, 'rgba(200, 255, 255, 1)');
          innerCore.addColorStop(0.4, 'rgba(0, 255, 200, 0.8)');
          innerCore.addColorStop(1, 'rgba(0, 200, 255, 0)');
          
          ctx.fillStyle = innerCore;
          ctx.beginPath();
          ctx.ellipse(0, halfH * 0.58, halfW * 0.35, halfH * 0.15, 0, 0, PI * 2);
          ctx.fill();
          
          // 能量粒子效果
          for (let i = 0; i < 6; i++) {
            const particleAngle = (time * 0.5 + i * PI * 0.33) % (PI * 2);
            const particleDist = engineSize * (0.5 + Math.sin(time * 2 + i) * 0.3);
            const px = Math.cos(particleAngle) * particleDist;
            const py = halfH * 0.6 + Math.sin(particleAngle) * particleDist * 0.3;
            const particleSize = 1 + Math.sin(time * 3 + i) * 0.5;
            const particleAlpha = 0.5 + Math.sin(time * 4 + i) * 0.3;
            
            ctx.fillStyle = `rgba(100, 200, 255, ${particleAlpha})`;
            ctx.beginPath();
            ctx.arc(px, py, particleSize, 0, PI * 2);
            ctx.fill();
          }
          
          // 引力透镜效果 - 边缘扭曲光带
          const lensGrad = ctx.createLinearGradient(-halfW, halfH * 0.6, halfW, halfH * 0.6);
          lensGrad.addColorStop(0, 'rgba(255, 255, 255, 0)');
          lensGrad.addColorStop(0.1, 'rgba(150, 200, 255, 0.3)');
          lensGrad.addColorStop(0.2, 'rgba(200, 200, 255, 0.1)');
          lensGrad.addColorStop(0.8, 'rgba(200, 200, 255, 0.1)');
          lensGrad.addColorStop(0.9, 'rgba(150, 200, 255, 0.3)');
          lensGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
          
          ctx.fillStyle = lensGrad;
          ctx.beginPath();
          ctx.ellipse(0, halfH * 0.6 + warpLength * 0.6, warpLength * 0.8, warpLength * 0.3, 0, 0, PI * 2);
          ctx.fill();
          
          ctx.globalCompositeOperation = 'source-over';
        }

        if (rocketTexture && rocketTexture.complete) {
          ctx.drawImage(rocketTexture, -halfW, -halfH, halfW * 2, halfH * 2);
        } else {
          const bodyLength = halfH * 1.1;
          const bodyWidth = halfW * 0.5;

          ctx.fillStyle = '#4a5568';
          ctx.beginPath();
          ctx.moveTo(0, -bodyLength);
          ctx.bezierCurveTo(bodyWidth * 0.8, -bodyLength * 0.7, bodyWidth, -bodyLength * 0.2, bodyWidth * 0.6, bodyLength * 0.5);
          ctx.lineTo(bodyWidth * 0.4, bodyLength * 0.7);
          ctx.lineTo(-bodyWidth * 0.4, bodyLength * 0.7);
          ctx.lineTo(-bodyWidth * 0.6, bodyLength * 0.5);
          ctx.bezierCurveTo(-bodyWidth, -bodyLength * 0.2, -bodyWidth * 0.8, -bodyLength * 0.7, 0, -bodyLength);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = '#2d3748';
          ctx.beginPath();
          ctx.moveTo(bodyWidth * 0.4, bodyLength * 0.4);
          ctx.lineTo(bodyWidth * 0.3, bodyLength * 0.6);
          ctx.lineTo(-bodyWidth * 0.3, bodyLength * 0.6);
          ctx.lineTo(-bodyWidth * 0.4, bodyLength * 0.4);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = '#64b4ff';
          ctx.beginPath();
          ctx.moveTo(0, -bodyLength * 0.85);
          ctx.bezierCurveTo(bodyWidth * 0.2, -bodyLength * 0.75, bodyWidth * 0.18, -bodyLength * 0.45, 0, -bodyLength * 0.5);
          ctx.bezierCurveTo(-bodyWidth * 0.18, -bodyLength * 0.45, -bodyWidth * 0.2, -bodyLength * 0.75, 0, -bodyLength * 0.85);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = '#87ceeb';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(0, -bodyLength * 0.55, bodyWidth * 0.12, 0, PI * 2);
          ctx.stroke();

          ctx.fillStyle = '#4a5568';
          ctx.beginPath();
          ctx.moveTo(-bodyWidth * 0.4, bodyLength * 0.1);
          ctx.lineTo(-bodyWidth * 1.5, bodyLength * 0.4);
          ctx.lineTo(-bodyWidth * 1.2, bodyLength * 0.6);
          ctx.lineTo(-bodyWidth * 0.3, bodyLength * 0.3);
          ctx.closePath();
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(bodyWidth * 0.4, bodyLength * 0.1);
          ctx.lineTo(bodyWidth * 1.5, bodyLength * 0.4);
          ctx.lineTo(bodyWidth * 1.2, bodyLength * 0.6);
          ctx.lineTo(bodyWidth * 0.3, bodyLength * 0.3);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = '#3399ff';
          ctx.globalAlpha = 0.5;
          ctx.beginPath();
          ctx.moveTo(-bodyWidth * 0.6, bodyLength * 0.15);
          ctx.lineTo(-bodyWidth * 1.4, bodyLength * 0.2);
          ctx.lineTo(-bodyWidth * 1.4, bodyLength * 0.5);
          ctx.lineTo(-bodyWidth * 0.6, bodyLength * 0.45);
          ctx.closePath();
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(bodyWidth * 0.6, bodyLength * 0.15);
          ctx.lineTo(bodyWidth * 1.4, bodyLength * 0.2);
          ctx.lineTo(bodyWidth * 1.4, bodyLength * 0.5);
          ctx.lineTo(bodyWidth * 0.6, bodyLength * 0.45);
          ctx.closePath();
          ctx.fill();

          ctx.globalAlpha = 1;

          ctx.strokeStyle = '#00bfff';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(-bodyWidth * 0.5, -bodyLength * 0.1);
          ctx.lineTo(bodyWidth * 0.5, -bodyLength * 0.1);
          ctx.moveTo(-bodyWidth * 0.5, bodyLength * 0.1);
          ctx.lineTo(bodyWidth * 0.5, bodyLength * 0.1);
          ctx.stroke();
        }

        ctx.restore();
      }
    }

    class Particle {
      constructor(x, y, vx, vy, life, color, screenSpace = false, size = null) {
        this.pos = new Vec2(x, y);
        this.vel = new Vec2(vx, vy);
        this.life = life;
        this.maxLife = life;
        this.color = color;
        this.screenSpace = screenSpace;
        this.size = size;
      }
      update(planets) {
        this.pos = this.pos.add(this.vel);
        this.vel = this.vel.mul(0.96);
        this.life -= 0.02;
        // 世界坐标粒子受行星重力影响
        if (!this.screenSpace) {
          for (const p of planets) {
            const d = this.pos.dist(p.pos);
            if (d > p.radius) {
              const dir = p.pos.sub(this.pos).normalize();
              const force = dir.mul(G * p.mass / (d * d));
              this.vel = this.vel.add(force);
            }
          }
        }
      }
      draw(ctx, camera) {
        const sp = this.screenSpace ? this.pos : camera.worldToScreen(this.pos);
        const alpha = clamp(this.life / this.maxLife, 0, 1);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        const baseR = this.screenSpace
          ? (this.size !== null ? this.size : 2)
          : Math.max(0.5, (this.size !== null ? this.size : 2) * camera.zoom);
        
        const shadowBlur = baseR * 2;
        ctx.shadowBlur = shadowBlur;
        ctx.shadowColor = this.color;
        
        ctx.arc(sp.x, sp.y, baseR, 0, PI * 2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }
    }

    class StarField {
      constructor(count) {
        this.stars = [];
        for (let i = 0; i < count; i++) {
          const angle = rand(0, PI * 2);
          const radius = rand(1000000, 200000000000);
          const distFactor = 1 - Math.min(radius / 100000000000, 1);
          const colorHue = rand(200, 280);
          const twinkleType = Math.floor(rand(0, 4));
          this.stars.push({
            x: Math.cos(angle) * radius,
            y: Math.sin(angle) * radius,
            size: rand(50, 200) * distFactor + rand(20, 80),
            baseOpacity: rand(0.3, 0.9) * distFactor + rand(0.2, 0.7),
            twinkleType,
            twinklePhase1: rand(0, PI * 2),
            twinklePhase2: rand(0, PI * 2),
            twinkleSpeed1: rand(0.3, 3),
            twinkleSpeed2: rand(0.2, 2),
            twinkleDepth: rand(0.4, 0.9),
            hue: colorHue,
            hueVariation: rand(0, 15),
            burstInterval: rand(2, 15),
            burstDuration: rand(0.1, 0.5),
            lastBurstTime: rand(0, 100),
            isBursting: false,
            fadeIn: rand(0, 1),
            fadeOut: rand(0, 1),
            flickerRate: rand(5, 20)
          });
        }
      }
      draw(ctx, camera) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const time = Date.now() * 0.001;
        for (const s of this.stars) {
          const sp = camera.worldToScreen(new Vec2(s.x, s.y));
          if (sp.x < -200 || sp.x > w + 200 || sp.y < -200 || sp.y > h + 200) continue;
          
          let alpha = s.baseOpacity;
          let sizeVariation = 1;
          let brightness = 70;
          
          switch (s.twinkleType) {
            case 0:
              const twinkle1 = Math.sin(time * s.twinkleSpeed1 + s.twinklePhase1);
              const twinkle2 = Math.sin(time * s.twinkleSpeed2 + s.twinklePhase2) * 0.5;
              const combined = (twinkle1 + twinkle2) * 0.5;
              alpha = clamp(s.baseOpacity * (1 + combined * s.twinkleDepth), 0.05, 1);
              sizeVariation = 1 + combined * s.twinkleDepth * 0.3;
              brightness = 70 + combined * 25;
              break;
            case 1:
              if (time - s.lastBurstTime > s.burstInterval) {
                s.lastBurstTime = time;
                s.isBursting = true;
              }
              if (s.isBursting) {
                const burstProgress = (time - s.lastBurstTime) / s.burstDuration;
                if (burstProgress >= 1) {
                  s.isBursting = false;
                  alpha = s.baseOpacity;
                } else {
                  const fadeUp = Math.sin(burstProgress * PI);
                  const fadeDown = Math.sin((burstProgress - 0.5) * PI);
                  alpha = clamp(s.baseOpacity * (1 + fadeUp * s.twinkleDepth * 2), 0.05, 1);
                  sizeVariation = 1 + fadeUp * 0.5;
                  brightness = 80 + fadeUp * 20;
                }
              } else {
                alpha = s.baseOpacity * (0.7 + Math.sin(time * 0.5 + s.twinklePhase1) * 0.3);
              }
              break;
            case 2:
              const flicker = Math.sin(time * s.flickerRate + s.twinklePhase1) > 0.5 ? 1 : rand(0.3, 0.9);
              alpha = clamp(s.baseOpacity * flicker, 0.05, 1);
              sizeVariation = 1 + (flicker - 0.5) * 0.2;
              brightness = 65 + flicker * 20;
              break;
            case 3:
              const pulse = Math.sin(time * s.twinkleSpeed1 + s.twinklePhase1);
              const slowPulse = Math.sin(time * s.twinkleSpeed2 * 0.3 + s.twinklePhase2);
              const totalPulse = (pulse + slowPulse * 0.5) * 0.5;
              alpha = clamp(s.baseOpacity * (0.5 + totalPulse * s.twinkleDepth * 0.5 + 0.5), 0.05, 1);
              sizeVariation = 1 + totalPulse * s.twinkleDepth * 0.4;
              brightness = 60 + totalPulse * 30;
              break;
          }
          
          const currentHue = s.hue + Math.sin(time * 0.5 + s.twinklePhase1) * s.hueVariation;
          const screenSize = Math.max(0.3, s.size * camera.zoom * sizeVariation);
          
          ctx.fillStyle = `hsla(${currentHue}, 60%, ${brightness}%, ${alpha})`;
          ctx.beginPath();
          ctx.arc(sp.x, sp.y, screenSize, 0, PI * 2);
          ctx.fill();
          
          if (screenSize > 1.5 && alpha > 0.3) {
            ctx.fillStyle = `hsla(${currentHue}, 50%, 90%, ${alpha * 0.3})`;
            ctx.beginPath();
            ctx.arc(sp.x, sp.y, screenSize * 1.6, 0, PI * 2);
            ctx.fill();
          }
        }
      }
    }

    class AsteroidBelt {
      constructor(count) {
        this.asteroids = [];
        const innerRadius = 314000000;
        const outerRadius = 493000000;
        for (let i = 0; i < count; i++) {
          const orbitRadius = rand(innerRadius, outerRadius);
          const orbitAngle = rand(0, PI * 2);
          const eccentricity = rand(0, 0.15);
          const size = rand(10, 200);
          const color = `hsl(${rand(20, 45)}, ${rand(10, 30)}%, ${rand(30, 50)}%)`;
          this.asteroids.push({
            orbitRadius,
            orbitAngle,
            eccentricity,
            size,
            color,
            rotation: rand(0, PI * 2),
            rotationSpeed: rand(-0.005, 0.005)
          });
        }
      }
      update() {
        for (const a of this.asteroids) {
          const period = Math.pow(a.orbitRadius, 1.5);
          const speed = 0.0000005 / period;
          a.orbitAngle += speed * ORBIT_SPEED_SCALE;
          a.rotation += a.rotationSpeed;
        }
      }
      draw(ctx, camera) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        for (const a of this.asteroids) {
          const r = a.orbitRadius * (1 + a.eccentricity * Math.sin(a.orbitAngle * 2));
          const x = Math.cos(a.orbitAngle) * r;
          const y = Math.sin(a.orbitAngle) * r;
          const sp = camera.worldToScreen(new Vec2(x, y));
          if (sp.x < -100 || sp.x > w + 100 || sp.y < -100 || sp.y > h + 100) continue;
          
          const screenSize = Math.max(1, a.size * camera.zoom);
          if (screenSize < 1) continue;
          
          ctx.save();
          ctx.translate(sp.x, sp.y);
          ctx.rotate(a.rotation);
          ctx.fillStyle = a.color;
          ctx.beginPath();
          const points = 8;
          for (let i = 0; i < points; i++) {
            const angle = (i / points) * PI * 2;
            const radius = screenSize * (0.7 + rand(0, 0.3));
            if (i === 0) ctx.moveTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
            else ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
          }
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }
    }

    class Camera {
      constructor() {
        this.pos = new Vec2(0, 0);
        this.baseZoom = 500 / EARTH_RADIUS;
        this.zoom = this.baseZoom;
        this.manualZoom = 1;
        this.targetManualZoom = 1;
        this.followTarget = null;
      }
      follow(target) {
        this.followTarget = target;
        const pos = target.pos || target;
        this.pos = new Vec2(pos.x, pos.y);
        this.manualZoom += (this.targetManualZoom - this.manualZoom) * 0.15;
        this.zoom = this.baseZoom * this.manualZoom;
      }
      update() {
        if (this.followTarget) {
          const pos = this.followTarget.pos || this.followTarget;
          this.pos = new Vec2(pos.x, pos.y);
        }
        this.manualZoom += (this.targetManualZoom - this.manualZoom) * 0.15;
        this.zoom = this.baseZoom * this.manualZoom;
      }
      worldToScreen(p) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        return new Vec2(
          (p.x - this.pos.x) * this.zoom + w / 2,
          (p.y - this.pos.y) * this.zoom + h / 2
        );
      }
    }

    // ================= 颜色工具 =================
    function hexToRgb(hex) {
      if (hex.startsWith('#')) {
        const n = parseInt(hex.slice(1), 16);
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }
      const rgbaMatch = hex.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
      if (rgbaMatch) {
        return { r: parseInt(rgbaMatch[1]), g: parseInt(rgbaMatch[2]), b: parseInt(rgbaMatch[3]) };
      }
      return null;
    }
    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(x => clamp(Math.round(x), 0, 255).toString(16).padStart(2, '0')).join('');
    }
    function lighten(hex, amt) {
      const c = hexToRgb(hex);
      return rgbToHex(c.r + amt, c.g + amt, c.b + amt);
    }
    function darken(hex, amt) {
      const c = hexToRgb(hex);
      return rgbToHex(c.r - amt, c.g - amt, c.b - amt);
    }
    function flameColor() {
      const h = rand(10, 50);
      return `hsl(${h}, 100%, ${rand(50, 70)}%)`;
    }

    function getChineseVoice(speaker) {
      if (speaker === 'athena' && gameState.athenaVoice) {
        const customVoice = cachedVoices.find(v => v.name === gameState.athenaVoice);
        if (customVoice) {
          console.log('Selected custom voice:', customVoice.name);
          return customVoice;
        }
      }
      
      const preferredVoices = [
        'Microsoft Yunxia Online (Natural) - Chinese (Mainland)',
        'Google 普通话（中国大陆）',
        'Microsoft Xiaoxiao - Chinese (Simplified)',
        'Microsoft Yaoyao - Chinese (Simplified)',
        'Microsoft Zira - Chinese (Simplified)',
        'Ting-Ting',
        'Zhiyu',
        'Microsoft Kangkang - Chinese (Simplified, PRC)'
      ];
      
      for (const name of preferredVoices) {
        const voice = cachedVoices.find(v => v.name === name);
        if (voice) {
          console.log('Selected voice:', name);
          return voice;
        }
      }
      
      const zhVoice = cachedVoices.find(v => v.lang.startsWith('zh'));
      if (zhVoice) {
        console.log('Selected fallback voice:', zhVoice.name);
        return zhVoice;
      }
      
      console.log('No Chinese voice found, using default');
      return null;
    }
    
    function speakDialogue(text, speaker) {
      if (!gameState.voiceEnabled) return;
      if (!('speechSynthesis' in window)) {
        console.log('Web Speech API not supported');
        return;
      }
      
      window.speechSynthesis.cancel();
      
      const sentences = text.split(/[。！？；\n]+/).filter(s => s.trim());
      
      if (sentences.length === 0) return;
      
      const voice = getChineseVoice(speaker);
      const isAthena = speaker === 'athena';
      
      console.log(`[Voice] Speaker: ${speaker}, Voice: ${voice ? voice.name : 'null'}, Voice lang: ${voice ? voice.lang : 'null'}`);
      
      let sentenceIndex = 0;
      
      function speakNextSentence() {
        if (sentenceIndex >= sentences.length || !gameState.voiceEnabled) {
          return;
        }
        
        const sentence = sentences[sentenceIndex];
        sentenceIndex++;
        
        const utterance = new SpeechSynthesisUtterance(sentence);
        
        if (voice) {
          utterance.voice = voice;
          utterance.lang = voice.lang;
        } else {
          utterance.lang = 'zh-CN';
        }
        
        utterance.rate = isAthena ? 0.9 : 0.85;
        
        if (isAthena) {
          utterance.pitch = 1.15;
          utterance.volume = 0.9;
        } else if (speaker === 'chen') {
          utterance.pitch = 0.8;
          utterance.volume = 0.9;
        } else {
          utterance.pitch = 1.0;
          utterance.volume = 0.85;
        }
        
        utterance.onend = () => {
          const lastChar = sentence.charAt(sentence.length - 1);
          const pauseTime = (lastChar === '。' || lastChar === '；') ? 250 : 
                           (lastChar === '！' || lastChar === '？') ? 350 : 150;
          
          setTimeout(speakNextSentence, pauseTime);
        };
        
        utterance.onerror = (event) => {
          if (event.error !== 'interrupted') {
            console.error('[Voice] Speech error:', event.error);
          }
        };
        
        console.log(`[Voice] Speaking: "${sentence.substring(0, 30)}...", lang: ${utterance.lang}, rate: ${utterance.rate}, pitch: ${utterance.pitch}`);
        
        window.speechSynthesis.speak(utterance);
      }
      
      speakNextSentence();
    }

    function showAthenaDialogue(dialogueId) {
      console.log('[Dialogue] showAthenaDialogue called with id:', dialogueId);
      let dialogues = DIALOGUES[dialogueId];
      console.log('[Dialogue] DIALOGUES[dialogueId]:', dialogues);
      if (!dialogues) {
        if (dialogueId.includes('_')) {
          const baseId = dialogueId.split('_')[0];
          dialogues = DIALOGUES[baseId];
          console.log('[Dialogue] Trying baseId:', baseId, 'result:', dialogues);
        }
      }
      if (!dialogues) {
        for (const key of Object.keys(DIALOGUES)) {
          const group = DIALOGUES[key];
          if (Array.isArray(group)) {
            const found = group.find(d => d.id === dialogueId);
            if (found) {
              dialogues = group;
              console.log('[Dialogue] Found in group:', key);
              break;
            }
          }
        }
      }
      if (!dialogues) {
        console.log('[Dialogue] No dialogues found for:', dialogueId);
        return;
      }

      let dialogue = dialogues[0];
      const foundById = dialogues.find(d => d.id === dialogueId);
      if (foundById) {
        dialogue = foundById;
      } else if (!dialogues[0].id) {
        dialogue = dialogues[0];
      }
      console.log('[Dialogue] Selected dialogue:', dialogue);

      gameState.currentDialogue = dialogue;

      const panel = document.getElementById('athena-panel');
      const message = document.getElementById('athena-message');
      const choices = document.getElementById('athena-choices');

      console.log('[Dialogue] Message element:', message);
      console.log('[Dialogue] Choices element:', choices);

      panel.classList.add('active');
      if (icon) icon.classList.add('breathing');
      console.log('[Dialogue] Panel classList after adding active:', panel.classList);
      document.getElementById('athena-btn').classList.add('hidden');

      let speakerName = '';

      message.innerHTML = `<strong style="color:#64b4ff">${speakerName}</strong>${textContent}`;
      
      speakDialogue(textContent, dialogue.speaker);
      choices.innerHTML = '';

      console.log('[Dialogue] dialogue.choices:', dialogue.choices);

        console.log('[Dialogue] Rendering', dialogue.choices.length, 'choices');
        for (const choice of dialogue.choices) {
          if (choice.condition && !gameState[choice.condition]) {
            console.log('[Dialogue] Skipping choice due to condition:', choice.text);
            continue;
          }
          const btn = document.createElement('div');
          btn.className = 'athena-choice';
          btn.textContent = choice.text;
          btn.addEventListener('click', () => {
            console.log('[Dialogue] Choice clicked:', choice.text);

                closeAthenaPanel();
                handleDialogueEnd(dialogue);
              }
            }

      if (dialogue.end && (!dialogue.choices || dialogue.choices.length === 0)) {

    function checkSignalDetection() {
      const distToPluto = rocket.pos.dist(new Vec2(5906380000, 0));
      const maxDist = 10000000000;
      const strength = Math.max(0, 1 - distToPluto / maxDist);

      if (strength > 0.1 && !gameState.signalDetected) {
        gameState.signalDetected = true;
        addStoryLog('📡 检测到来自冥王星方向的异常信号...', true, 'secret');
      }

      const signalIndicator = document.querySelector('.signal-indicator');
      if (signalIndicator) {
        if (strength > 0.1) {
          signalIndicator.style.display = 'block';
          signalIndicator.style.opacity = Math.min(1, strength * 1.5);
          const pulseSpeed = Math.max(0.3, 1 - strength * 0.7);
          signalIndicator.style.animation = `pulse ${pulseSpeed}s ease-in-out infinite`;
          
          if (strength > 0.7) {
            signalIndicator.style.background = '#ff0000';
            signalIndicator.style.boxShadow = '0 0 20px rgba(255, 0, 0, 0.8)';
          } else if (strength > 0.4) {
            signalIndicator.style.background = '#ff6600';
            signalIndicator.style.boxShadow = '0 0 15px rgba(255, 100, 0, 0.6)';
          } else {
            signalIndicator.style.background = '#ff4d4d';
            signalIndicator.style.boxShadow = '0 0 10px rgba(255, 77, 77, 0.4)';
          }
        } else {
          signalIndicator.style.display = 'none';
        }
      }

      gameState.signalStrength = strength;
    }
